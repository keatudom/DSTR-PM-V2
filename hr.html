<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ใบลงเวลาทีม · HR · DSTR</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F3864">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DSTR">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<style>
.app { padding-bottom: 30px; max-width: 640px; margin: 0 auto; }
.hr-hdr { background:#1F3864; color:#fff; padding:16px 16px 18px; border-radius:0 0 18px 18px; }
.hr-hdr-h { font-size:18px; font-weight:700; display:flex; align-items:center; gap:7px; }
.hr-hdr-sub { font-size:12.5px; opacity:.85; margin-top:3px; }
.hr-body { padding:14px; }
.hr-ctrl { background:#fff; border:1px solid #E5E7EB; border-radius:13px; padding:13px; margin-bottom:14px; }
.hr-lbl { font-size:11.5px; font-weight:600; color:#4B5563; margin:0 0 6px; display:block; }
.hr-quick { display:flex; gap:7px; margin-bottom:11px; flex-wrap:wrap; }
.hr-qbtn { padding:8px 14px; border:1.5px solid #D1D5DB; background:#fff; border-radius:99px; font-size:12.5px; font-weight:600; color:#4B5563; cursor:pointer; font-family:inherit; }
.hr-qbtn.on { border-color:#1F3864; background:#EEF2FF; color:#1F3864; }
.hr-row { display:flex; gap:9px; flex-wrap:wrap; align-items:flex-end; }
.hr-inp, .hr-sel { border:1.5px solid #D1D5DB; border-radius:9px; padding:9px 11px; font-size:13.5px; font-family:inherit; }
.hr-sum { display:flex; gap:10px; margin-bottom:12px; }
.hr-sum-c { flex:1; background:#fff; border:1px solid #E5E7EB; border-radius:12px; padding:11px; text-align:center; }
.hr-sum-v { font-size:21px; font-weight:700; color:#1F3864; }
.hr-sum-l { font-size:10.5px; color:#6B7280; margin-top:2px; }
.hr-print { width:100%; min-height:46px; background:#1F3864; color:#fff; border:none; border-radius:11px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; margin-bottom:14px; }

.hr-person { background:#fff; border:1px solid #E5E7EB; border-radius:13px; padding:13px; margin-bottom:11px; }
.hr-p-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
.hr-p-name { font-size:15px; font-weight:700; color:#1F2937; }
.hr-p-role { font-size:11px; color:#6B7280; }
.hr-p-days { font-size:11.5px; font-weight:700; color:#0d6e4f; background:#D1FAE5; padding:3px 11px; border-radius:99px; white-space:nowrap; }
.hr-day { border-top:1px solid #F0F0F3; padding:7px 0 3px; }
.hr-day-d { font-size:12.5px; font-weight:600; color:#374151; margin-bottom:3px; }
.hr-ent { font-size:11.5px; color:#4B5563; padding:2px 0; display:flex; gap:7px; }
.hr-ent-t { font-weight:700; color:#1F3864; min-width:40px; }
.hr-badge { font-size:9.5px; font-weight:700; padding:1px 6px; border-radius:99px; }
.hr-b-on { background:#D1FAE5; color:#065F46; } .hr-b-off { background:#FEF3C7; color:#92400E; } .hr-b-flag { background:#FEE2E2; color:#991B1B; }
.hr-empty { text-align:center; color:#9CA3AF; font-size:13px; padding:30px 14px; }
.hr-deny { text-align:center; padding:50px 20px; }
.hr-back { font-size:12.5px; color:#fff; background:rgba(255,255,255,.15); border:none; border-radius:99px; padding:6px 13px; font-family:inherit; cursor:pointer; margin-top:8px; }

@media print {
  .hr-hdr .hr-back, .hr-ctrl, .hr-print, .hr-sum { display:none !important; }
  .app { padding:0; max-width:100%; } .hr-body { padding:0; }
  .hr-hdr { background:#fff; color:#000; border:none; padding:0 0 8px; border-radius:0; }
  .hr-hdr-sub { color:#333; }
  .hr-person { border:none; border-bottom:1.5px solid #000; border-radius:0; page-break-inside:avoid; }
  #hrPrintHead { display:block !important; }
}
#hrPrintHead { display:none; font-size:12px; color:#555; margin-bottom:8px; }
</style>
</head>
<body>
<div class="app">
  <div class="hr-hdr">
    <div class="hr-hdr-h">🗂️ ใบลงเวลาทีม (HR)</div>
    <div class="hr-hdr-sub">ดูการเข้างานทุกคน · ไว้เบิกค่าแรง</div>
    <button class="hr-back" onclick="history.length>1?history.back():location.href='index.html'">← กลับ</button>
  </div>
  <div class="hr-body">
    <div id="hrMain" style="display:none">
      <div class="hr-ctrl">
        <span class="hr-lbl">ช่วงเวลา</span>
        <div class="hr-quick" id="hrQuick">
          <button class="hr-qbtn on" data-r="week" onclick="setRange('week',this)">สัปดาห์นี้</button>
          <button class="hr-qbtn" data-r="lastweek" onclick="setRange('lastweek',this)">สัปดาห์ที่แล้ว</button>
          <button class="hr-qbtn" data-r="month" onclick="setRange('month',this)">เดือนนี้</button>
        </div>
        <div class="hr-row">
          <div><span class="hr-lbl">ตั้งแต่</span><input type="date" class="hr-inp" id="hrFrom" onchange="customRange()"></div>
          <div><span class="hr-lbl">ถึง</span><input type="date" class="hr-inp" id="hrTo" onchange="customRange()"></div>
          <div style="flex:1;min-width:140px"><span class="hr-lbl">ไซต์</span>
            <select class="hr-sel" id="hrSite" style="width:100%" onchange="load()"><option value="">ทุกไซต์</option></select>
          </div>
        </div>
      </div>

      <div class="hr-sum">
        <div class="hr-sum-c"><div class="hr-sum-v" id="hrCntPeople">—</div><div class="hr-sum-l">คน</div></div>
        <div class="hr-sum-c"><div class="hr-sum-v" id="hrCntManDays">—</div><div class="hr-sum-l">วัน-คน รวม</div></div>
        <div class="hr-sum-c"><div class="hr-sum-v" id="hrCntFlag">—</div><div class="hr-sum-l">🚩 GPS ไกล</div></div>
      </div>
      <button class="hr-print" onclick="window.print()">🖨️ พิมพ์ / บันทึก PDF (แยกหน้าต่อคน)</button>

      <div id="hrPrintHead"></div>
      <div id="hrList"><div class="hr-empty">กำลังโหลด...</div></div>
    </div>

    <div id="hrDeny" class="hr-deny" style="display:none">
      <div style="font-size:40px">🔒</div>
      <div style="font-size:16px;font-weight:700;color:#1F2937;margin:8px 0 4px">เฉพาะฝ่ายบุคคล (HR)</div>
      <div style="font-size:13px;color:#6B7280">บัญชีของคุณไม่มีสิทธิ์ดูใบลงเวลาทีม<br>ถ้าคุณคือ HR แจ้งเจ้าของงานให้ตั้งบทบาทเป็น "ฝ่ายบุคคล"</div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
if (!Auth.requireAuth('admin')) { /* client ถูกเด้งออก */ }

var TH_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
var ROLE_TH = { owner:'เจ้าของกิจการ', director:'ผู้ดูแลโครงการ', pm:'PM', hr:'ฝ่ายบุคคล',
  site_engineer:'วิศวกรหน้างาน', foreman:'โฟร์แมน', purchaser:'ฝ่ายจัดซื้อ', contractor:'ผู้รับเหมา', admin:'แอดมิน' };
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtTH(d){ d=(d instanceof Date)?d:new Date(d+'T00:00:00'); return d.getDate()+' '+TH_MONTHS[d.getMonth()]+' '+(d.getFullYear()+543); }

function rangeFor(kind){
  var now=new Date(), f, t;
  if(kind==='week'||kind==='lastweek'){
    var dow=(now.getDay()+6)%7, mon=new Date(now); mon.setDate(now.getDate()-dow);
    if(kind==='lastweek') mon.setDate(mon.getDate()-7);
    f=mon; t=new Date(mon); t.setDate(mon.getDate()+6);
  } else { f=new Date(now.getFullYear(),now.getMonth(),1); t=new Date(now.getFullYear(),now.getMonth()+1,0); }
  return { from:ymd(f), to:ymd(t) };
}
function setRange(kind,btn){
  document.querySelectorAll('.hr-qbtn').forEach(function(b){b.classList.remove('on');});
  if(btn) btn.classList.add('on');
  var r=rangeFor(kind);
  document.getElementById('hrFrom').value=r.from;
  document.getElementById('hrTo').value=r.to;
  load();
}
function customRange(){ document.querySelectorAll('.hr-qbtn').forEach(function(b){b.classList.remove('on');}); load(); }

function load(){
  var from=document.getElementById('hrFrom').value, to=document.getElementById('hrTo').value;
  var site=document.getElementById('hrSite').value;
  document.getElementById('hrList').innerHTML='<div class="hr-empty">กำลังโหลด...</div>';
  API.getAttendanceAll({ from:from, to:to, project_id:site }).then(function(res){
    if(!res || res.ok===false){ // ไม่มีสิทธิ์ (ATTEND)
      document.getElementById('hrMain').style.display='none';
      document.getElementById('hrDeny').style.display='block';
      return;
    }
    var d=res.data||res;
    fillSites(d.projects||[]);
    render(d, from, to);
  }).catch(function(){
    document.getElementById('hrList').innerHTML='<div class="hr-empty">โหลดไม่สำเร็จ ลองใหม่</div>';
  });
}

var sitesFilled=false;
function fillSites(projects){
  if(sitesFilled) return; sitesFilled=true;
  var sel=document.getElementById('hrSite'); var cur=sel.value;
  sel.innerHTML='<option value="">ทุกไซต์</option>'+projects.map(function(p){
    return '<option value="'+p.project_id+'">'+p.name+'</option>'; }).join('');
  sel.value=cur;
}

function render(d, from, to){
  var staff=d.staff||[];
  document.getElementById('hrPrintHead').textContent='ใบลงเวลาทีม · '+fmtTH(from)+' – '+fmtTH(to);
  var manDays=0, flags=0;
  staff.forEach(function(s){ manDays+=s.days_present; s.days.forEach(function(dd){ flags+=dd.flagged_count||0; }); });
  document.getElementById('hrCntPeople').textContent=staff.length;
  document.getElementById('hrCntManDays').textContent=manDays;
  document.getElementById('hrCntFlag').textContent=flags;

  if(!staff.length){ document.getElementById('hrList').innerHTML='<div class="hr-empty">ยังไม่มีการเช็คอินในช่วงนี้</div>'; return; }
  var html='';
  staff.forEach(function(s){
    var role=ROLE_TH[s.role]||s.role||'';
    var days=s.days.slice().reverse().map(function(dd){
      var ent=dd.entries.map(function(e){
        var b=e.location_type==='offsite'
          ? '<span class="hr-badge hr-b-off">'+(e.off_site_reason||'นอกไซต์')+'</span>'
          : (e.is_far?'<span class="hr-badge hr-b-flag">🚩 GPS ไกล</span>':'<span class="hr-badge hr-b-on">ไซต์</span>');
        return '<div class="hr-ent"><span class="hr-ent-t">'+e.time+'</span><span style="flex:1">'+(e.activity||'-')+' '+b+'</span></div>';
      }).join('');
      return '<div class="hr-day"><div class="hr-day-d">'+fmtTH(dd.date)+'</div>'+ent+'</div>';
    }).join('');
    html+='<div class="hr-person"><div class="hr-p-head"><div><div class="hr-p-name">'+s.staff_name+'</div>'+
      (role?'<div class="hr-p-role">'+role+'</div>':'')+'</div><div class="hr-p-days">มา '+s.days_present+' วัน</div></div>'+days+'</div>';
  });
  document.getElementById('hrList').innerHTML=html;
}

// boot
(function(){
  var role=Auth.getRole();
  var allow={ hr:1, owner:1, creator:1, director:1, pm:1, admin:1 };
  if(role && !allow[role]){ // role ที่ไม่ใช่ HR/ผู้บริหาร → แจ้งไม่มีสิทธิ์ (server ก็กันอยู่)
    document.getElementById('hrDeny').style.display='block'; return;
  }
  document.getElementById('hrMain').style.display='block';
  var r=rangeFor('week');
  document.getElementById('hrFrom').value=r.from;
  document.getElementById('hrTo').value=r.to;
  load();
})();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
</script>
</body>
</html>
