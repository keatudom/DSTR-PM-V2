<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — DSTR PM V3</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Design System CSS -->
  <link rel="stylesheet" href="css/design-system.css">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body {
      background-color: var(--color-slate-50);
      display: flex;
      min-height: 100vh;
    }
    
    .login-container {
      display: flex;
      width: 100%;
      height: 100vh;
    }
    
    .login-left {
      flex: 1;
      background: linear-gradient(135deg, var(--color-slate-900) 0%, var(--color-blue-700) 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: var(--space-8);
      color: white;
      position: relative;
      overflow: hidden;
    }

    /* Abstract shapes for background */
    .login-left::before {
      content: '';
      position: absolute;
      top: -10%;
      right: -10%;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
    }

    .login-left::after {
      content: '';
      position: absolute;
      bottom: -10%;
      left: -10%;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(59,130,246,0.2) 0%, rgba(37,99,235,0) 100%);
    }
    
    .login-right {
      width: 480px;
      background-color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--space-8);
      box-shadow: -10px 0 30px rgba(0,0,0,0.05);
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      font-size: var(--text-2xl);
      font-weight: 700;
      z-index: 1;
    }
    
    .brand-icon {
      width: 40px;
      height: 40px;
      background: white;
      color: var(--color-blue-600);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon i {
      width: 24px;
      height: 24px;
    }
    
    .hero-text {
      max-width: 420px;
      z-index: 1;
    }
    
    .hero-text h1 {
      font-size: 2.5rem;
      color: white;
      line-height: 1.3;
      margin-bottom: var(--space-4);
    }
    
    .hero-text p {
      font-size: var(--text-lg);
      color: rgba(255,255,255,0.8);
    }
    
    .login-form-container {
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
    }
    
    .login-header {
      margin-bottom: var(--space-6);
    }
    
    .login-header h2 {
      font-size: var(--text-2xl);
      margin-bottom: var(--space-2);
    }
    
    .login-header p {
      color: var(--color-slate-500);
    }
    
    .btn-google {
      width: 100%;
      background-color: white;
      border: 1px solid var(--color-slate-300);
      color: var(--color-slate-700);
      padding: var(--space-3);
      font-size: var(--text-base);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
      box-shadow: var(--shadow-sm);
    }
    
    .btn-google:hover {
      background-color: var(--color-slate-50);
      border-color: var(--color-slate-400);
    }
    
    .btn-google img {
      width: 20px;
      height: 20px;
    }
    
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--color-slate-400);
      font-size: var(--text-sm);
      margin-bottom: var(--space-6);
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--color-slate-200);
    }
    
    .divider:not(:empty):before {
      margin-right: var(--space-4);
    }
    
    .divider:not(:empty):after {
      margin-left: var(--space-4);
    }
    
    .btn-login {
      width: 100%;
      padding: var(--space-3);
      font-size: var(--text-base);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-6);
      font-size: var(--text-sm);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--color-slate-600);
    }

    .checkbox-group input {
      width: 16px;
      height: 16px;
      accent-color: var(--color-blue-600);
      cursor: pointer;
    }

    .checkbox-group label {
      cursor: pointer;
    }
    
    @media (max-width: 900px) {
      .login-left {
        display: none;
      }
      .login-right {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <!-- Left Side: Branding & Hero -->
    <div class="login-left">
      <div class="brand">
        <div class="brand-icon">
          <i data-lucide="building-2"></i>
        </div>
        DSTR Project Management
      </div>
      
      <div class="hero-text">
        <h1>บริหารงานก่อสร้างอย่างมืออาชีพ</h1>
        <p>ระบบจัดการโครงการก่อสร้างระดับองค์กรสำหรับบริษัท ดีไซน์ ทีเรีย จำกัด</p>
      </div>
      
      <div style="z-index: 1; font-size: var(--text-sm); color: rgba(255,255,255,0.6);">
        &copy; 2026 Designterior. All rights reserved.
      </div>
    </div>
    
    <!-- Right Side: Login Form -->
    <div class="login-right">
      <div class="login-form-container">
        
        <div class="login-header">
          <h2>ยินดีต้อนรับกลับมา</h2>
          <p>กรุณากรอกข้อมูลเพื่อเข้าสู่ระบบ</p>
        </div>
        
        <button class="btn btn-google" onclick="window.location.href='dashboard.html';">
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
          เข้าสู่ระบบด้วย Google
        </button>
        
        <div class="divider">หรือเข้าด้วยรหัสผ่าน</div>
        
        <form action="dashboard.html" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
          <div class="form-group">
            <label class="form-label">อีเมล</label>
            <input type="email" class="form-input" placeholder="กรอกอีเมลของคุณ" required value="pm@designterior.com">
          </div>
          
          <div class="form-group">
            <label class="form-label">รหัสผ่าน</label>
            <input type="password" class="form-input" placeholder="••••••••" required value="password123">
          </div>
          
          <div class="form-options">
            <div class="checkbox-group">
              <input type="checkbox" id="remember" checked>
              <label for="remember">จำการเข้าระบบ 7 วัน</label>
            </div>
            <a href="#">ลืมรหัสผ่าน?</a>
          </div>
          
          <button type="submit" class="btn btn-primary btn-login">เข้าสู่ระบบ</button>
        </form>

      </div>
    </div>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
</body>
</html>
