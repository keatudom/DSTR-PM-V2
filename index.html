<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSTR Project Management — Login</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
</head>
<body class="login-page">
<div class="login-wrap">
  <div class="login-brand-row">
    <div class="login-logo">🏗️</div>
    <div class="login-brand">DSTR Project Management</div>
    <div class="login-sub">ระบบติดตามโครงการ บริษัท ดีไซน์ ทีเรีย จำกัด</div>
  </div>
  <div class="login-card">
    <h3>เข้าสู่ระบบ</h3>
    <div class="login-card-sub">กรอกรหัสผ่านเพื่อเข้าใช้งาน</div>
    <div class="login-error" id="loginError"></div>
    <input type="password" class="login-input" id="passwordInput" placeholder="รหัสผ่าน" onkeyup="if(event.key==='Enter')doLogin()">
    <label class="remember-row">
      <input type="checkbox" id="rememberMe" checked>
      <span>จำการเข้าสู่ระบบ 7 วัน</span>
    </label>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ →</button>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
// ถ้า login อยู่แล้ว → ไป projects.html
if (Auth.isLoggedIn()) {
  window.location.href = 'projects.html';
}

async function doLogin() {
  const password = document.getElementById('passwordInput').value.trim();
  const errorBox = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  errorBox.classList.remove('show');

  if (!password) {
    errorBox.textContent = 'กรุณากรอกรหัสผ่าน';
    errorBox.classList.add('show');
    return;
  }

  // Loading state
  btn.disabled = true;
  btn.textContent = 'กำลังตรวจสอบ...';

  try {
    const result = await Auth.login(password);
    if (result.ok) {
      window.location.href = 'projects.html';
    } else {
      errorBox.textContent = '❌ ' + result.error;
      errorBox.classList.add('show');
      document.getElementById('passwordInput').value = '';
      btn.disabled = false;
      btn.textContent = 'เข้าสู่ระบบ →';
    }
  } catch (err) {
    errorBox.textContent = '❌ เกิดข้อผิดพลาด ลองใหม่อีกครั้ง';
    errorBox.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'เข้าสู่ระบบ →';
  }
}

document.getElementById('passwordInput').focus();
</script>
</body>
</html>
