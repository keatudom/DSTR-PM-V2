<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSTR Project Management — Login</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F3864">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DSTR">
<link rel="apple-touch-icon" href="icons/icon-180.png">
</head>
<body class="login-page">
<div class="login-wrap">
  <div class="login-brand-row">
    <div class="login-logo">🏗️</div>
    <div class="login-brand">DSTR Project Management</div>
    <div class="login-sub">ระบบติดตามโครงการ บริษัท ดีไซน์ ทีเรีย จำกัด</div>
  </div>
  <div class="login-card">
    <h3>เข้าสู่ระบบ</h3>
    <div class="login-card-sub">เข้าสู่ระบบด้วยบัญชี Google ของคุณ</div>
    <div class="login-error" id="loginError"></div>

    <!-- Phase G: Sign in with Google (หลัก) -->
    <div id="googleBtn" style="display:flex;justify-content:center;margin:8px 0 4px;min-height:44px"></div>
    <div id="googleHint" style="font-size:12px;color:#9CA3AF;text-align:center;margin-bottom:6px">กำลังโหลดปุ่ม Google…</div>
    <div id="gAuthMsg" style="display:none;font-size:12.5px;color:#92400e;background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:9px 11px;margin:8px 0;line-height:1.5"></div>

    <!-- fallback: รหัสผ่าน (สำรอง / legacy) -->
    <details style="margin-top:12px;border-top:1px solid #Eceff3;padding-top:10px">
      <summary style="font-size:12.5px;color:#6B7280;cursor:pointer;user-select:none">หรือเข้าด้วยรหัสผ่าน (สำรอง)</summary>
      <div style="margin-top:10px">
        <input type="password" class="login-input" id="passwordInput" placeholder="รหัสผ่าน" onkeyup="if(event.key==='Enter')doLogin()">
        <label class="remember-row">
          <input type="checkbox" id="rememberMe" checked>
          <span>จำการเข้าสู่ระบบ 7 วัน</span>
        </label>
        <button class="login-btn" id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ →</button>
      </div>
    </details>
  </div>
  <div style="text-align:center;margin-top:18px;">
    <a href="about.html" style="font-size:12.5px;color:#1F3864;text-decoration:none;font-weight:500;padding:8px 16px;border-radius:99px;background:rgba(255,255,255,0.7);border:1px solid #E5E7EB;display:inline-block;">เกี่ยวกับเรา · DESIGNTERIOR →</a>
  </div>
</div>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
// ถ้า login อยู่แล้ว → ไป projects.html
if (Auth.isLoggedIn()) {
  window.location.href = 'projects.html';
}

// ─────────────────────────────────────────────
// Phase G: Sign in with Google (GIS)
// ─────────────────────────────────────────────
async function handleGoogleCredential(resp) {
  const errorBox = document.getElementById('loginError');
  const gMsg = document.getElementById('gAuthMsg');
  errorBox.classList.remove('show');
  gMsg.style.display = 'none';
  document.getElementById('googleHint').textContent = 'กำลังตรวจสอบ…';

  try {
    const result = await Auth.loginGoogle(resp.credential);
    if (result.ok) {
      window.location.href = 'projects.html';
      return;
    }
    if (result.notAuthorized) {
      gMsg.innerHTML = '🔒 อีเมล <b>' + (result.email || '') + '</b> ยังไม่ได้รับอนุญาต<br>' +
        'แจ้งเจ้าของงาน/แอดมินให้เพิ่มสิทธิ์ก่อน แล้วลองใหม่';
      gMsg.style.display = 'block';
    } else {
      errorBox.textContent = '❌ ' + result.error;
      errorBox.classList.add('show');
    }
  } catch (e) {
    errorBox.textContent = '❌ เข้าสู่ระบบไม่สำเร็จ ลองใหม่อีกครั้ง';
    errorBox.classList.add('show');
  }
  document.getElementById('googleHint').textContent = '';
}

// GIS เรียก callback นี้เมื่อไลบรารีโหลดเสร็จ
window.onGoogleLibraryLoad = function() {
  try {
    google.accounts.id.initialize({
      client_id: CONFIG.GOOGLE_CLIENT_ID,
      callback: handleGoogleCredential
    });
    google.accounts.id.renderButton(
      document.getElementById('googleBtn'),
      { theme: 'filled_blue', size: 'large', text: 'signin_with', shape: 'pill', width: 280 }
    );
    document.getElementById('googleHint').textContent = '';
  } catch (e) {
    document.getElementById('googleHint').textContent = 'โหลดปุ่ม Google ไม่สำเร็จ — ใช้รหัสผ่านสำรองได้';
  }
};

async function doLogin() {
  const password = document.getElementById('passwordInput').value.trim();
  const errorBox = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  errorBox.classList.remove('show');

  if (!password) {
    errorBox.textContent = 'กรุณากรอกรหัสผ่าน';
    errorBox.classList.add('show');
    return;
  }

  // Loading state
  btn.disabled = true;
  btn.textContent = 'กำลังตรวจสอบ...';

  try {
    const result = await Auth.login(password);
    if (result.ok) {
      window.location.href = 'projects.html';
    } else {
      errorBox.textContent = '❌ ' + result.error;
      errorBox.classList.add('show');
      document.getElementById('passwordInput').value = '';
      btn.disabled = false;
      btn.textContent = 'เข้าสู่ระบบ →';
    }
  } catch (err) {
    errorBox.textContent = '❌ เกิดข้อผิดพลาด ลองใหม่อีกครั้ง';
    errorBox.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'เข้าสู่ระบบ →';
  }
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}
</script>
<script src="js/pwa-install.js"></script>
</body>
</html>
