<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Team · Bow House</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<style>
.tm-app { padding-bottom: 80px; }

/* Header */
.tm-hdr { background: linear-gradient(135deg,#1F3864 0%,#0C447C 100%); color:#fff; padding:14px 16px; border-radius:0 0 16px 16px; margin:-16px -16px 12px; }
.tm-hdr-r { display:flex; justify-content:space-between; align-items:center; }
.tm-hdr-h { font-size:17px; font-weight:600; margin:0; color:#fff; }
.tm-hdr-d { font-size:11px; opacity:0.85; margin-top:2px; }
.tm-hdr-back { background:rgba(255,255,255,0.15); color:#fff; border:none; padding:6px 12px; border-radius:99px; font-size:11px; font-weight:500; font-family:inherit; cursor:pointer; }

/* Tabs */
.tm-tabs { display:flex; gap:6px; margin-bottom:12px; }
.tm-tab { flex:1; text-align:center; padding:9px; border-radius:10px; font-size:12.5px; font-weight:500; font-family:inherit; cursor:pointer; border:1px solid #E5E7EB; background:#fff; color:#6B7280; }
.tm-tab.on { background:#1F3864; color:#fff; border-color:#1F3864; }

/* Team card */
.tm-card { background:#fff; border:1px solid #E5E7EB; border-radius:14px; padding:14px; margin-bottom:10px; }
.tm-card-head { display:flex; align-items:center; gap:10px; }
.tm-avatar { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0; }
.tm-av-wood { background:#E6F1FB; color:#0C447C; }
.tm-av-elec { background:#FAEEDA; color:#854F0B; }
.tm-av-paint { background:#FBEAF0; color:#993556; }
.tm-av-gen { background:#F1EFE8; color:#5F5E5A; }
.tm-card-info { flex:1; min-width:0; }
.tm-card-name { font-size:14px; font-weight:600; color:#1F2937; }
.tm-card-sub { font-size:11.5px; color:#6B7280; margin-top:1px; }
.tm-badge { font-size:10px; padding:3px 9px; border-radius:99px; font-weight:600; flex-shrink:0; }
.tm-badge-active { background:#E1F5EE; color:#0F6E56; }
.tm-chev { color:#9CA3AF; font-size:14px; cursor:pointer; }

/* Contract box */
.tm-contract { background:#F9FAFB; border-radius:10px; padding:10px; margin-top:10px; }
.tm-ct-row { display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px; }
.tm-ct-label { color:#6B7280; }
.tm-ct-val { font-weight:600; color:#1F2937; }
.tm-bar { height:6px; background:#E5E7EB; border-radius:99px; overflow:hidden; margin-bottom:6px; }
.tm-bar-fill { height:100%; background:#1D9E75; transition:width .3s; }
.tm-ct-foot { display:flex; justify-content:space-between; font-size:10.5px; }
.tm-ct-paid { color:#0F6E56; }
.tm-ct-left { color:#6B7280; }

/* Milestones */
.tm-ms-title { font-size:11px; color:#6B7280; margin:10px 0 4px; }
.tm-ms-list { display:flex; flex-direction:column; gap:4px; }
.tm-ms { display:flex; align-items:center; gap:7px; font-size:11.5px; padding:7px 9px; border-radius:8px; }
.tm-ms-paid { background:#E1F5EE; }
.tm-ms-partial { background:#FAEEDA; }
.tm-ms-pending { background:#F3F4F6; }
.tm-ms-ic { font-size:13px; flex-shrink:0; }
.tm-ms-ic-paid { color:#0F6E56; }
.tm-ms-ic-partial { color:#854F0B; }
.tm-ms-ic-pending { color:#9CA3AF; }
.tm-ms-name { flex:1; min-width:0; }
.tm-ms-amt { font-weight:600; flex-shrink:0; }
.tm-ms-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:1px; }
.tm-ms-evid { font-size:9.5px; color:#6B7280; }
.tm-ms-amt-paid { color:#0F6E56; }
.tm-ms-amt-partial { color:#854F0B; }
.tm-ms-amt-pending { color:#6B7280; }

/* Buttons */
.tm-acts { display:flex; gap:6px; margin-top:10px; }
.tm-btn { flex:1; padding:8px; border-radius:8px; font-size:11.5px; font-weight:600; font-family:inherit; cursor:pointer; border:1px solid #E5E7EB; background:#fff; color:#1F3864; }
.tm-btn:hover { background:#F3F4F6; }
.tm-btn-add { background:#1F3864; color:#fff; border-color:#1F3864; }
.tm-btn-add:hover { background:#162a4d; }
.tm-add-team { width:100%; margin-top:6px; padding:11px; border-radius:10px; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; border:1px dashed #B4B2A9; background:#fff; color:#1F3864; }
.tm-add-team:hover { background:#F9FAFB; }

/* Staff card */
.tm-staff { background:#fff; border:1px solid #E5E7EB; border-radius:12px; padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:11px; }
.tm-staff-role { font-size:10px; padding:2px 8px; border-radius:99px; font-weight:600; }
.tm-role-pm { background:#EEEDFE; color:#3C3489; }
.tm-role-fm { background:#E6F1FB; color:#0C447C; }
.tm-role-se { background:#E1F5EE; color:#0F6E56; }

/* Collapsed */
.tm-collapsed .tm-contract,
.tm-collapsed .tm-ms-title,
.tm-collapsed .tm-ms-list,
.tm-collapsed .tm-acts { display:none; }

/* Loading / empty */
.tm-loading { text-align:center; padding:40px 0; color:#9CA3AF; }
.tm-empty { text-align:center; padding:30px 16px; color:#9CA3AF; font-size:12.5px; }
.tm-empty-ic { font-size:32px; opacity:0.4; margin-bottom:8px; }

/* Bottom nav */
.bnav { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #E5E7EB; padding:6px 4px 8px; display:flex; justify-content:space-around; z-index:48; }
.bnav-i { display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 12px; color:#9CA3AF; cursor:pointer; min-width:54px; text-decoration:none; }
.bnav-i.on { color:#1F3864; }
.bnav-ic { font-size:18px; }
.bnav-lb { font-size:9px; font-weight:500; }

/* Modal extras */
.tm-field { margin-bottom:10px; }
.tm-field-label { font-size:11px; color:#6B7280; margin-bottom:4px; display:block; }
.tm-input, .tm-select { width:100%; padding:8px 10px; border:1px solid #E5E7EB; border-radius:8px; font-size:12.5px; font-family:inherit; box-sizing:border-box; }
.tm-input:focus, .tm-select:focus { outline:none; border-color:#1F3864; }
.tm-row2 { display:flex; gap:8px; }
.tm-row2 > * { flex:1; }
.tm-note { font-size:10.5px; color:#6B7280; background:#F9FAFB; padding:7px 10px; border-radius:8px; margin-bottom:8px; }
.tm-priv { font-size:10px; color:#854F0B; background:#FAEEDA; padding:6px 10px; border-radius:8px; margin-bottom:10px; }

/* Contract file list */
.tm-file-list { display:flex; flex-direction:column; gap:4px; }
.tm-file-row { display:flex; align-items:center; gap:8px; padding:8px 10px; background:#F9FAFB; border:1px solid #E5E7EB; border-radius:8px; }
.tm-file-ic { font-size:15px; flex-shrink:0; }
.tm-file-name { flex:1; min-width:0; font-size:12px; color:#1F3864; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tm-file-name:hover { text-decoration:underline; }
.tm-file-del { font-size:12px; color:#D1D5DB; cursor:pointer; padding:0 4px; flex-shrink:0; }
.tm-file-del:hover { color:#E24B4A; }
</style>
</head>
<body>
<div class="app-wrap">
  <div class="tm-app">

    <div id="loadingScreen" class="tm-loading">
      <div class="spinner"></div>
      <div style="margin-top:10px">กำลังโหลด...</div>
    </div>

    <div id="mainContent" style="display:none">
      <div class="tm-hdr">
        <div class="tm-hdr-r">
          <div>
            <h2 class="tm-hdr-h">👷 ทีมงาน</h2>
            <div class="tm-hdr-d" id="hdrSub">Bow House · ผู้รับเหมา & ทีมบริษัท</div>
          </div>
          <button class="tm-hdr-back" onclick="window.location.href='dashboard.html?project=bow-house'">← กลับ</button>
        </div>
      </div>

      <div class="tm-tabs">
        <button class="tm-tab on" id="tabContractor" onclick="switchTab('contractor')">🔨 ผู้รับเหมา</button>
        <button class="tm-tab" id="tabStaff" onclick="switchTab('staff')">👔 ทีมบริษัท</button>
      </div>

      <div id="tabContent"></div>
    </div>

  </div>
</div>

<div class="bnav">
  <a class="bnav-i" href="dashboard.html?project=bow-house"><div class="bnav-ic">🏠</div><div class="bnav-lb">Home</div></a>
  <a class="bnav-i" href="materials.html?project=bow-house"><div class="bnav-ic">📦</div><div class="bnav-lb">Materials</div></a>
  <a class="bnav-i" href="daily.html?project=bow-house"><div class="bnav-ic">📝</div><div class="bnav-lb">Daily</div></a>
  <a class="bnav-i on" href="#"><div class="bnav-ic">👷</div><div class="bnav-lb">Team</div></a>
  <a class="bnav-i" href="projects.html"><div class="bnav-ic">⋯</div><div class="bnav-lb">More</div></a>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/modal.js"></script>
<script>
// Team page — allow both admin and client (client sees limited view)
Auth.requireAuth();

const tmState = {
  tab: 'contractor',
  teams: [],
  contracts: [],
  milestones: [],
  staff: [],
  contractFiles: [],
  paymentSlips: [],
  isAdmin: true,
  collapsed: {}
};

// =========================
// LOAD
// =========================
async function loadAll() {
  try {
    // Determine role
    tmState.isAdmin = (typeof Auth.getRole === 'function')
      ? Auth.getRole() === 'admin'
      : true;

    const res = await API.callRead('get_teams_bundle');
    if (!res.ok || !res.data) throw new Error(res.error || 'โหลดข้อมูลไม่สำเร็จ');

    tmState.teams = res.data.teams || [];
    tmState.contracts = res.data.contracts || [];
    tmState.milestones = res.data.milestones || [];
    tmState.staff = res.data.staff || [];
    tmState.contractFiles = res.data.contract_files || [];
    tmState.paymentSlips = res.data.payment_slips || [];

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    renderTab();
  } catch (err) {
    document.getElementById('loadingScreen').innerHTML =
      '❌ ' + err.message + '<br><span style="font-size:11px">ลองรีเฟรชหน้า หรือเช็คว่า import sheet แล้ว</span>';
  }
}

function switchTab(tab) {
  tmState.tab = tab;
  document.getElementById('tabContractor').classList.toggle('on', tab === 'contractor');
  document.getElementById('tabStaff').classList.toggle('on', tab === 'staff');
  renderTab();
}

function renderTab() {
  if (tmState.tab === 'contractor') renderContractors();
  else renderStaff();
}

// =========================
// RENDER — CONTRACTORS
// =========================
function renderContractors() {
  const el = document.getElementById('tabContent');
  const teams = tmState.teams.filter(t => t.category === 'contractor');

  if (teams.length === 0) {
    el.innerHTML = `
      <div class="tm-empty">
        <div class="tm-empty-ic">🔨</div>
        ยังไม่มีทีมผู้รับเหมา
      </div>
      ${tmState.isAdmin ? '<button class="tm-add-team" onclick="openAddTeam()">+ เพิ่มทีม / ผู้รับเหมา</button>' : ''}
    `;
    return;
  }

  let html = '';
  teams.forEach(team => {
    html += renderTeamCard(team);
  });

  if (tmState.isAdmin) {
    html += '<button class="tm-add-team" onclick="openAddTeam()">+ เพิ่มทีม / ผู้รับเหมา</button>';
  }
  el.innerHTML = html;
}

function renderTeamCard(team) {
  const avClass = team.type && team.type.indexOf('ไฟ') >= 0 ? 'tm-av-elec'
    : team.type && team.type.indexOf('สี') >= 0 ? 'tm-av-paint'
    : team.type && team.type.indexOf('ไม้') >= 0 ? 'tm-av-wood'
    : 'tm-av-gen';
  const avIcon = team.type && team.type.indexOf('ไฟ') >= 0 ? '⚡'
    : team.type && team.type.indexOf('สี') >= 0 ? '🎨'
    : team.type && team.type.indexOf('ไม้') >= 0 ? '🪵'
    : '🔧';

  const collapsed = tmState.collapsed[team.team_id];

  // Find main contract for this team
  const contracts = tmState.contracts.filter(c => c.team_id === team.team_id);
  const mainContract = contracts.find(c => c.type === 'main') || contracts[0];

  let bodyHtml = '';
  if (tmState.isAdmin && mainContract) {
    bodyHtml = renderContractBody(team, mainContract, contracts);
  } else if (tmState.isAdmin && !mainContract) {
    bodyHtml = `
      <div class="tm-note" style="margin-top:10px">ยังไม่มีสัญญา</div>
      <div class="tm-acts">
        <button class="tm-btn tm-btn-add" onclick="openAddContract('${team.team_id}')">+ เพิ่มสัญญา</button>
      </div>
    `;
  }
  // Client: no contract body at all (privacy)

  return `
    <div class="tm-card ${collapsed ? 'tm-collapsed' : ''}">
      <div class="tm-card-head">
        <div class="tm-avatar ${avClass}">${avIcon}</div>
        <div class="tm-card-info">
          <div class="tm-card-name">${escapeHtml(team.name)}</div>
          <div class="tm-card-sub">หัวหน้า: ${escapeHtml(team.lead_name || '-')}</div>
        </div>
        <span class="tm-badge tm-badge-active">ทำงานอยู่</span>
        ${tmState.isAdmin ? `<span class="tm-chev" onclick="toggleCollapse('${team.team_id}')">${collapsed ? '▸' : '▾'}</span>` : ''}
      </div>
      ${bodyHtml}
    </div>
  `;
}

function renderContractBody(team, contract, allContracts) {
  const value = contract.value || 0;
  const paid = contract.paid_total || 0;
  const left = value - paid;
  const pct = value > 0 ? Math.round((paid / value) * 100) : 0;

  // Milestones for this contract
  const ms = tmState.milestones
    .filter(m => m.contract_id === contract.contract_id)
    .sort((a, b) => a.seq - b.seq);

  let msHtml = '';
  ms.forEach(m => {
    const st = m.status || 'pending';
    const icCls = st === 'paid' ? 'tm-ms-paid' : st === 'partial' ? 'tm-ms-partial' : 'tm-ms-pending';
    const icon = st === 'paid' ? '✓' : st === 'partial' ? '◐' : '○';
    const iconCls = st === 'paid' ? 'tm-ms-ic-paid' : st === 'partial' ? 'tm-ms-ic-partial' : 'tm-ms-ic-pending';
    const amtCls = st === 'paid' ? 'tm-ms-amt-paid' : st === 'partial' ? 'tm-ms-amt-partial' : 'tm-ms-amt-pending';

    let amtText;
    if (st === 'paid') {
      amtText = fmtMoney(m.paid_amount || m.amount) + '฿';
    } else if (st === 'partial') {
      const remain = (m.amount || 0) - (m.paid_amount || 0);
      amtText = fmtMoney(m.paid_amount) + ' / ค้าง ' + fmtMoney(remain) + '฿';
    } else {
      amtText = fmtMoney(m.amount) + '฿';
    }

    // มิติหลักฐาน — แสดงเฉพาะงวดที่จ่ายแล้ว (partial/paid)
    let evidHtml = '';
    if (st === 'paid' || st === 'partial') {
      const ev = m.evidence_status || 'none';
      const slipCount = tmState.paymentSlips.filter(s => s.milestone_id === m.milestone_id).length;
      const evMap = {
        none:    { dot: '🔴', txt: 'ไม่มีหลักฐาน' },
        partial: { dot: '🟡', txt: 'หลักฐานบางส่วน' },
        full:    { dot: '🟢', txt: 'หลักฐานครบ' }
      };
      const e = evMap[ev] || evMap.none;
      evidHtml = `<span class="tm-ms-evid">${e.dot} ${e.txt}${slipCount > 0 ? ' (' + slipCount + ')' : ''}</span>`;
    }

    msHtml += `
      <div class="tm-ms ${icCls}" onclick="openMilestone('${m.milestone_id}','${contract.contract_id}')">
        <span class="tm-ms-ic ${iconCls}">${icon}</span>
        <div class="tm-ms-body">
          <span class="tm-ms-name">${escapeHtml(m.name)}</span>
          ${evidHtml}
        </div>
        <span class="tm-ms-amt ${amtCls}">${amtText}</span>
      </div>
    `;
  });

  // Variation orders (งานเพิ่ม)
  const variations = allContracts.filter(c => c.type === 'variation');
  let varHtml = '';
  if (variations.length > 0) {
    varHtml = '<div class="tm-ms-title">📋 งานเพิ่ม</div><div class="tm-ms-list">';
    variations.forEach(v => {
      varHtml += `
        <div class="tm-ms tm-ms-pending">
          <span class="tm-ms-ic tm-ms-ic-pending">+</span>
          <span class="tm-ms-name">${escapeHtml(v.title || v.contract_no)}</span>
          <span class="tm-ms-amt tm-ms-amt-pending">${fmtMoney(v.value)}฿</span>
        </div>
      `;
    });
    varHtml += '</div>';
  }

  // ไฟล์สัญญาทั้งหมดของสัญญานี้
  const files = tmState.contractFiles.filter(f => f.contract_id === contract.contract_id);

  let filesHtml = '';
  if (files.length > 0) {
    let listHtml = '';
    files.forEach(f => {
      const icon = f.file_type === 'pdf' ? '📄' : '🖼️';
      listHtml += `
        <div class="tm-file-row">
          <span class="tm-file-ic">${icon}</span>
          <span class="tm-file-name" onclick="openLink('${escapeHtml(f.url)}')">${escapeHtml(f.name)}</span>
          <span class="tm-file-del" onclick="deleteContractFile('${f.file_id}')">✕</span>
        </div>
      `;
    });
    filesHtml = `
      <div class="tm-ms-title">📎 ไฟล์สัญญา (${files.length})</div>
      <div class="tm-file-list">${listHtml}</div>
    `;
  }

  return `
    <div class="tm-contract">
      <div class="tm-ct-row">
        <span class="tm-ct-label">มูลค่าสัญญา</span>
        <span class="tm-ct-val">${fmtMoney(value)} ฿</span>
      </div>
      <div class="tm-bar"><div class="tm-bar-fill" style="width:${pct}%"></div></div>
      <div class="tm-ct-foot">
        <span class="tm-ct-paid">จ่ายแล้ว ${fmtMoney(paid)}฿</span>
        <span class="tm-ct-left">คงเหลือ ${fmtMoney(left)}฿</span>
      </div>
    </div>
    <div class="tm-ms-title">งวดการจ่าย · แตะเพื่อบันทึกจ่ายเงิน</div>
    <div class="tm-ms-list">${msHtml || '<div class="tm-note">ยังไม่มีงวด</div>'}</div>
    ${varHtml}
    ${filesHtml}
    <div class="tm-acts">
      <button class="tm-btn" onclick="openUploadContract('${contract.contract_id}')">📎 ${files.length > 0 ? 'เพิ่มไฟล์' : 'แนบสัญญา'}</button>
      <button class="tm-btn" onclick="openAddVariation('${team.team_id}','${contract.contract_id}')">+ งานเพิ่ม</button>
    </div>
  `;
}

function toggleCollapse(teamId) {
  tmState.collapsed[teamId] = !tmState.collapsed[teamId];
  renderTab();
}

// =========================
// RENDER — STAFF
// =========================
function renderStaff() {
  const el = document.getElementById('tabContent');
  if (tmState.staff.length === 0) {
    el.innerHTML = `
      <div class="tm-empty">
        <div class="tm-empty-ic">👔</div>
        ยังไม่มีทีมงานบริษัท
      </div>
      ${tmState.isAdmin ? '<button class="tm-add-team" onclick="openAddStaff()">+ เพิ่มทีมงาน</button>' : ''}
    `;
    return;
  }

  let html = '';
  tmState.staff.forEach(s => {
    const role = (s.role || '').toLowerCase();
    const roleCls = role.indexOf('manager') >= 0 ? 'tm-role-pm'
      : role.indexOf('foreman') >= 0 ? 'tm-role-fm'
      : role.indexOf('engineer') >= 0 ? 'tm-role-se'
      : 'tm-role-fm';
    const initial = (s.name || '?').slice(0, 1);

    html += `
      <div class="tm-staff">
        <div class="tm-avatar tm-av-gen">${initial}</div>
        <div class="tm-card-info">
          <div class="tm-card-name">${escapeHtml(s.name)}</div>
          ${s.phone ? '<div class="tm-card-sub">📞 ' + escapeHtml(s.phone) + '</div>' : ''}
        </div>
        <span class="tm-staff-role ${roleCls}">${escapeHtml(s.role || '-')}</span>
        ${tmState.isAdmin ? `<span class="tm-chev" onclick="openEditStaff('${s.staff_id}')">✏️</span>` : ''}
      </div>
    `;
  });

  if (tmState.isAdmin) {
    html += '<button class="tm-add-team" onclick="openAddStaff()">+ เพิ่มทีมงาน</button>';
  }
  el.innerHTML = html;
}

// =========================
// MODALS — TEAM
// =========================
function openAddTeam() {
  Modal.show(`
    <div class="modal-title">➕ เพิ่มทีม / ผู้รับเหมา</div>
    <div class="tm-field">
      <label class="tm-field-label">ชื่อทีม</label>
      <input type="text" class="tm-input" id="ntName" placeholder="เช่น ทีมช่างไม้">
    </div>
    <div class="tm-row2">
      <div class="tm-field">
        <label class="tm-field-label">ประเภท</label>
        <select class="tm-select" id="ntType">
          <option>ช่างไม้</option>

      <input type="file" class="tm-input" id="cfFile" accept="image/*,application/pdf"
             style="padding:6px" onchange="previewContractFile()">
    </div>
    <div class="tm-field">
      <label class="tm-field-label">ชื่อ/คำอธิบายไฟล์</label>
      <input type="text" class="tm-input" id="cfName" placeholder="เช่น หน้า 1 ขอบเขตงาน">
    </div>
    <div id="cfPreview" style="display:none;text-align:center;margin-bottom:10px">
      <div id="cfPreviewInner"></div>
    </div>
    <div class="tm-note">💡 แนบได้หลายไฟล์ · เก็บใน Google Drive · เปิดดูได้ในแอป</div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="Modal.close()">ยกเลิก</button>
      <button class="modal-btn modal-btn-primary" id="cfUploadBtn" onclick="doUploadContract('${contractId}')">อัปโหลด</button>
    </div>
  `, 'pay-modal');
}

function previewContractFile() {
  const input = document.getElementById('cfFile');
  const file = input.files && input.files[0];
  const box = document.getElementById('cfPreview');
  const inner = document.getElementById('cfPreviewInner');
  if (!file) { box.style.display = 'none'; return; }

  // Size check — 10MB limit
  if (file.size > 10 * 1024 * 1024) {
    Modal.toast('❌ ไฟล์ใหญ่เกิน 10MB');
    input.value = '';
    box.style.display = 'none';
    return;
  }

  box.style.display = 'block';
  // Auto-fill name field with filename (without extension) if empty
  const nameInput = document.getElementById('cfName');
  if (nameInput && !nameInput.value.trim()) {
    nameInput.value = file.name.replace(/\.[^.]+$/, '');
  }

  if (file.type.indexOf('pdf') >= 0) {
    inner.innerHTML = '<div style="font-size:12px;color:#6B7280">📄 ' +
      escapeHtml(file.name) + ' (' + Math.round(file.size/1024) + ' KB)</div>';
  } else {
    const reader = new FileReader();
    reader.onload = e => {
      inner.innerHTML = '<img src="' + e.target.result +
        '" style="max-width:100%;max-height:160px;border-radius:8px">';
    };
    reader.readAsDataURL(file);
  }
}

async function doUploadContract(contractId) {
  const input = document.getElementById('cfFile');
  const file = input.files && input.files[0];
  if (!file) { Modal.toast('กรุณาเลือกไฟล์'); return; }

  const fileName = document.getElementById('cfName').value.trim()
    || file.name.replace(/\.[^.]+$/, '');

  const btn = document.getElementById('cfUploadBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังอัปโหลด...';

  try {
    // Read file as base64
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const res = await API.callPost('upload_contract_file', {
      contract_id: contractId,
      file_base64: base64,
      file_name: fileName
    });

    if (!res.ok) throw new Error(res.error || 'อัปโหลดไม่สำเร็จ');

    Modal.close();
    Modal.toast('✓ แนบไฟล์สัญญาแล้ว');
    setTimeout(() => loadAll(), 1200);
  } catch (err) {
    Modal.toast('❌ ' + err.message);
    btn.disabled = false;
    btn.textContent = 'อัปโหลด';
  }
}

async function deleteContractFile(fileId) {
  if (!confirm('ลบไฟล์สัญญานี้?')) return;

    </div>
    <div class="tm-field">
      <label class="tm-field-label">💰 สถานะการจ่าย</label>
      <select class="tm-select" id="mpStatus">
        <option value="pending" ${m.status==='pending'?'selected':''}>ยังไม่จ่าย</option>
        <option value="partial" ${m.status==='partial'?'selected':''}>จ่ายบางส่วน</option>
        <option value="paid" ${m.status==='paid'?'selected':''}>จ่ายครบงวด</option>
      </select>
    </div>
    <div class="tm-field">
      <label class="tm-field-label">📎 สถานะหลักฐาน (สลิป/ใบโอน)</label>
      <select class="tm-select" id="mpEvidence">
        <option value="none" ${(m.evidence_status||'none')==='none'?'selected':''}>🔴 ยังไม่มีหลักฐาน</option>
        <option value="partial" ${m.evidence_status==='partial'?'selected':''}>🟡 มีหลักฐานบางส่วน</option>
        <option value="full" ${m.evidence_status==='full'?'selected':''}>🟢 หลักฐานครบ</option>
      </select>
    </div>
    ${renderSlipsSection(milestoneId)}
    <div class="tm-priv">⚠️ ตรวจสอบกับสัญญาตัวจริง + ผู้ดูแลบัญชีก่อนจ่ายเงินจริง</div>

      <button class="modal-btn modal-btn-primary" onclick="saveMilestone('${milestoneId}','${contractId}')">บันทึก</button>
    </div>
  `, 'pay-modal');
}

function renderSlipsSection(milestoneId) {
  const slips = tmState.paymentSlips.filter(s => s.milestone_id === milestoneId);
  let listHtml = '';
  slips.forEach(s => {
    const icon = s.file_type === 'pdf' ? '📄' : '🖼️';
    listHtml += `
      <div class="tm-file-row">
        <span class="tm-file-ic">${icon}</span>
        <span class="tm-file-name" onclick="openLink('${escapeHtml(s.url)}')">${escapeHtml(s.name)}</span>
        <span class="tm-file-del" onclick="deletePaymentSlip('${s.slip_id}')">✕</span>
      </div>
    `;
  });
  return `
    <div class="tm-field">
      <label class="tm-field-label">หลักฐานที่แนบ (${slips.length})</label>
      <div class="tm-file-list">
        ${listHtml || '<div style="font-size:11px;color:#9CA3AF;padding:4px">ยังไม่มีหลักฐาน</div>'}
      </div>
      <button class="tm-btn" style="margin-top:6px;width:100%"
              onclick="openUploadSlip('${milestoneId}')">📎 แนบสลิป/หลักฐาน</button>
    </div>
  `;
}

    </div>
  `, 'pay-modal');
}

async function saveStaff() {
  const name = document.getElementById('nsName').value.trim();
  if (!name) { Modal.toast('กรุณาใส่ชื่อ'); return; }
  Modal.close();
  Modal.toast('กำลังบันทึก...');
  try {
    const res = await API.callWrite('create_staff', {
      name: name,
      role: document.getElementById('nsRole').value,
      phone: document.getElementById('nsPhone').value.trim()
    });
    if (!res.ok) throw new Error(res.error || 'บันทึกไม่สำเร็จ');
    Modal.toast('✓ เพิ่มทีมงานแล้ว');
    setTimeout(() => loadAll(), 1200);
  } catch (err) {
    Modal.toast('❌ ' + err.message);
  }
}

function openEditStaff(staffId) {
  const s = tmState.staff.find(x => x.staff_id === staffId);
  if (!s) return;
  Modal.show(`
    <div class="modal-title">✏️ แก้ไขทีมงาน</div>
    <div class="tm-field">
      <label class="tm-field-label">ชื่อ</label>
      <input type="text" class="tm-input" id="esName" value="${escapeHtml(s.name)}">
    </div>
    <div class="tm-row2">
      <div class="tm-field">
        <label class="tm-field-label">ตำแหน่ง</label>
        <select class="tm-select" id="esRole">
          <option ${s.role==='Project Manager'?'selected':''}>Project Manager</option>
          <option ${s.role==='Foreman'?'selected':''}>Foreman</option>
          <option ${s.role==='Site Engineer'?'selected':''}>Site Engineer</option>
          <option ${s.role==='Admin'?'selected':''}>Admin</option>
        </select>
      </div>
      <div class="tm-field">
        <label class="tm-field-label">เบอร์โทร</label>
        <input type="text" class="tm-input" id="esPhone" value="${escapeHtml(s.phone || '')}">
      </div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="Modal.close()">ยกเลิก</button>
      <button class="modal-btn modal-btn-primary" onclick="saveEditStaff('${staffId}')">บันทึก</button>
    </div>
  `, 'pay-modal');
}

async function saveEditStaff(staffId) {
  const name = document.getElementById('esName').value.trim();
  if (!name) { Modal.toast('กรุณาใส่ชื่อ'); return; }
  Modal.close();
  Modal.toast('กำลังบันทึก...');
  try {
    const res = await API.callWrite('update_staff', {
      staff_id: staffId,
      name: name,
      role: document.getElementById('esRole').value,
      phone: document.getElementById('esPhone').value.trim()
    });
    if (!res.ok) throw new Error(res.error || 'บันทึกไม่สำเร็จ');
    Modal.toast('✓ บันทึกแล้ว');
    setTimeout(() => loadAll(), 1200);
  } catch (err) {
    Modal.toast('❌ ' + err.message);
  }
}

// =========================
// UTILS
// =========================
function fmtMoney(n) {
  return Number(n || 0).toLocaleString('en-US');
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function openLink(url) {
  if (!url) return;
  window.open(url, '_blank');
}

// =========================
// INIT
// =========================
loadAll();
</script>
</body>
</html>
