<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>วัสดุ / สโตร์ — DSTR PM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/design-system.css">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#0f172a">
<style>
  .mat-subhdr { display:flex; justify-content:space-between; align-items:flex-start; gap:var(--space-3); margin-bottom:var(--space-4); }
  .mat-subhdr h1 { font-size:var(--text-2xl); }
  .mat-subhdr-sub { color:var(--color-slate-500); font-size:var(--text-sm); margin-top:2px; }

  /* AI alert banner */
  .mat-ai-bnr { display:flex; align-items:center; gap:var(--space-3); background:var(--color-warning-50); border:1px solid #fde68a; border-radius:var(--radius-lg); padding:var(--space-3) var(--space-4); margin-bottom:var(--space-4); cursor:pointer; }
  .mat-ai-bnr-i { font-size:20px; }
  .mat-ai-bnr-tx { flex:1; font-size:var(--text-sm); color:var(--color-warning-700); line-height:1.5; }

  /* Tabs */
  .mat-tabs { display:flex; gap:6px; overflow-x:auto; margin-bottom:var(--space-4); padding-bottom:2px; }
  .mat-tab { display:inline-flex; align-items:center; gap:5px; padding:8px 14px; border:1px solid var(--color-slate-300); background:#fff; color:var(--color-slate-600); border-radius:var(--radius-full); font-size:var(--text-xs); font-weight:500; cursor:pointer; font-family:inherit; white-space:nowrap; }
  .mat-tab i { width:14px; height:14px; }
  .mat-tab.on { background:var(--color-blue-600); color:#fff; border-color:var(--color-blue-600); }
  .mat-tab-pane { display:none; }
  .mat-tab-pane.on { display:block; }
  .mat-soon { text-align:center; padding:var(--space-8); color:var(--color-slate-400); }
  .mat-soon i { width:40px; height:40px; color:var(--color-slate-300); margin-bottom:var(--space-2); }

  /* Stock filter */
  .stk-filter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:var(--space-3); }
  .stk-f-btn { padding:6px 12px; border:1px solid var(--color-slate-300); background:#fff; color:var(--color-slate-600); border-radius:var(--radius-full); font-size:var(--text-xs); font-weight:500; cursor:pointer; font-family:inherit; }
  .stk-f-btn.on { background:var(--color-slate-700); color:#fff; border-color:var(--color-slate-700); }

  /* Stock card */
  .stk-card { border:1px solid var(--color-slate-200); border-radius:var(--radius-lg); margin-bottom:var(--space-2); background:#fff; overflow:hidden; }
  .stk-card.zero { border-color:#fecaca; } .stk-card.low { border-color:#fde68a; }
  .stk-card-main { display:flex; align-items:center; gap:var(--space-3); padding:var(--space-3); cursor:pointer; }
  .stk-card-icon { font-size:24px; flex-shrink:0; }
  .stk-card-bd { flex:1; min-width:0; }
  .stk-card-nm { font-size:var(--text-sm); font-weight:600; color:var(--color-slate-800); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .stk-card-meta { font-size:11px; color:var(--color-slate-500); margin-top:2px; }
  .stk-card-stk { font-size:var(--text-xl); font-weight:700; color:var(--color-slate-900); white-space:nowrap; }
  .stk-card-unit { font-size:11px; color:var(--color-slate-400); font-weight:400; }
  .stk-card.zero .stk-card-stk { color:var(--color-error-600); } .stk-card.low .stk-card-stk { color:var(--color-warning-700); }
  .stk-status-0,.stk-status-1,.stk-status-2,.stk-status-3 { font-size:var(--text-sm); font-weight:700; white-space:nowrap; }
  .stk-status-0 { color:var(--color-error-600); } .stk-status-1 { color:var(--color-warning-700); } .stk-status-2 { color:var(--color-blue-700); } .stk-status-3 { color:var(--color-success-700); }
  .mode-badge { font-size:9px; padding:1px 6px; border-radius:var(--radius-full); font-weight:600; }
  .mode-badge.status { background:var(--color-warning-50); color:var(--color-warning-700); }
  .mode-badge.count { background:var(--color-blue-50); color:var(--color-blue-700); }
  .stk-status-btns { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; padding:0 var(--space-3) var(--space-2); }
  .ssb { display:flex; flex-direction:column; align-items:center; gap:1px; padding:6px 2px; border:1px solid var(--color-slate-200); background:#fff; border-radius:var(--radius-md); font-size:9px; color:var(--color-slate-600); cursor:pointer; font-family:inherit; }
  .ssb-ic { font-size:13px; }
  .ssb.on.s3 { background:var(--color-success-50); border-color:var(--color-success-500); color:var(--color-success-700); }
  .ssb.on.s2 { background:var(--color-blue-50); border-color:var(--color-blue-500); color:var(--color-blue-700); }
  .ssb.on.s1 { background:var(--color-warning-50); border-color:var(--color-warning-500); color:var(--color-warning-700); }
  .ssb.on.s0 { background:var(--color-error-50); border-color:var(--color-error-500); color:var(--color-error-700); }
  .ssb.saving { opacity:0.5; }
  .stk-card-acts { display:flex; gap:6px; padding:0 var(--space-3) var(--space-3); }
  .stk-act { flex:1; padding:7px; border:1px solid var(--color-slate-300); background:#fff; border-radius:var(--radius-md); font-size:var(--text-xs); font-weight:500; cursor:pointer; font-family:inherit; color:var(--color-slate-600); }
  .stk-act.del:hover { background:var(--color-error-50); color:var(--color-error-700); border-color:#fecaca; }
  .empty { text-align:center; color:var(--color-slate-400); font-size:var(--text-sm); padding:var(--space-8); }
  .empty-i { font-size:32px; margin-bottom:var(--space-2); }

  /* Material detail gallery */
  .mat-gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:6px; }
  .mat-gallery-item { aspect-ratio:1; border-radius:var(--radius-md); overflow:hidden; background:var(--color-slate-100); cursor:pointer; }
  .mat-gallery-item img { width:100%; height:100%; object-fit:cover; }
  .mat-gallery-item.add { display:flex; align-items:center; justify-content:center; border:2px dashed var(--color-slate-300); background:#fff; font-size:24px; color:var(--color-blue-600); }
  .modal-info-row { display:flex; gap:var(--space-2); font-size:var(--text-sm); padding:2px 0; }
  .modal-info-key { color:var(--color-slate-500); min-width:80px; }
  .modal-info-val { color:var(--color-slate-800); font-weight:500; }

  /* ════ Chapter 2: forms ════ */
  .mf-form { display:flex; flex-direction:column; gap:var(--space-3); }
  .mf-grp { display:flex; flex-direction:column; gap:4px; }
  .mf-row { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-2); }
  .mf-lb { font-size:var(--text-xs); font-weight:600; color:var(--color-slate-600); }
  .mf-in { width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid var(--color-slate-300); border-radius:var(--radius-md); font-size:var(--text-sm); font-family:inherit; color:var(--color-slate-900); background:#fff; }
  .mf-in:focus { outline:none; border-color:var(--color-blue-500); box-shadow:0 0 0 2px var(--color-blue-100); }
  .mf-submit { margin-top:var(--space-2); padding:12px; background:var(--color-blue-600); color:#fff; border:none; border-radius:var(--radius-md); font-size:var(--text-sm); font-weight:600; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:6px; }
  .mf-submit:hover { background:var(--color-blue-700); }
  .mf-submit i { width:16px; height:16px; }
  .mat-pick-btn { display:flex; align-items:center; justify-content:space-between; width:100%; padding:10px 12px; border:1px solid var(--color-slate-300); background:#fff; border-radius:var(--radius-md); font-size:var(--text-sm); font-family:inherit; color:var(--color-slate-800); cursor:pointer; text-align:left; }
  .mat-pick-btn.placeholder { color:var(--color-slate-400); }
  .mpb-caret { font-size:11px; color:var(--color-slate-400); flex-shrink:0; }
  .bill-scan-btn { display:flex; align-items:center; justify-content:center; gap:6px; padding:12px; background:var(--color-slate-900); color:#fff; border:none; border-radius:var(--radius-md); font-size:var(--text-sm); font-weight:600; cursor:pointer; font-family:inherit; }
  .bill-scan-btn i { width:17px; height:17px; }
  .bill-divider { text-align:center; font-size:11px; color:var(--color-slate-400); position:relative; }
  .rcv-status-btns { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; }
  .rsb { padding:10px; border:1px solid var(--color-slate-300); background:#fff; border-radius:var(--radius-md); font-size:var(--text-sm); font-weight:600; cursor:pointer; font-family:inherit; color:var(--color-slate-700); }
  .rsb.on.s3 { background:var(--color-success-50); border-color:var(--color-success-500); color:var(--color-success-700); }
  .rsb.on.s2 { background:var(--color-blue-50); border-color:var(--color-blue-500); color:var(--color-blue-700); }
  .rsb.on.s1 { background:var(--color-warning-50); border-color:var(--color-warning-500); color:var(--color-warning-700); }
  .rsb.on.s0 { background:var(--color-error-50); border-color:var(--color-error-500); color:var(--color-error-700); }
  .nm-hint { font-size:11px; color:var(--color-slate-500); line-height:1.5; }
  .nm-req { color:var(--color-error-600); }
  .photo-btn { display:flex; align-items:center; justify-content:center; gap:6px; padding:12px; border:1px dashed var(--color-slate-300); background:#fff; border-radius:var(--radius-md); font-size:var(--text-sm); color:var(--color-slate-600); cursor:pointer; font-family:inherit; }
  .photo-btn.has-photo { border-color:var(--color-success-500); color:var(--color-success-700); background:var(--color-success-50); }
  .photo-previews { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .photo-thumb { position:relative; width:64px; height:64px; border-radius:var(--radius-md); overflow:hidden; }
  .photo-thumb img { width:100%; height:100%; object-fit:cover; }
  .photo-thumb-x { position:absolute; top:2px; right:2px; width:20px; height:20px; border-radius:50%; background:rgba(0,0,0,0.6); color:#fff; font-size:11px; display:flex; align-items:center; justify-content:center; cursor:pointer; }

  /* New material modal */
  .nm-prefill { font-size:11px; color:var(--color-blue-700); background:var(--color-blue-50); border-radius:var(--radius-md); padding:8px 10px; margin-bottom:var(--space-2); line-height:1.5; text-align:left; }
  .nm-mode { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .nm-mode-opt { padding:10px; border:1px solid var(--color-slate-300); background:#fff; border-radius:var(--radius-md); cursor:pointer; font-family:inherit; text-align:center; }
  .nm-mode-opt.on { border-color:var(--color-blue-500); background:var(--color-blue-50); }
  .nm-mode-ic { font-size:20px; }
  .nm-mode-nm { font-size:var(--text-xs); font-weight:600; color:var(--color-slate-800); margin-top:2px; }
  .nm-mode-ds { font-size:9px; color:var(--color-slate-500); }

  /* Material picker (bottom sheet) */
  .mp-wrap { text-align:left; }
  .mp-search { width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid var(--color-slate-300); border-radius:var(--radius-md); font-size:var(--text-sm); font-family:inherit; margin-bottom:8px; }
  .mp-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .mp-chip { padding:5px 12px; border:1px solid var(--color-slate-300); background:#fff; color:var(--color-slate-600); border-radius:var(--radius-full); font-size:11px; cursor:pointer; font-family:inherit; }
  .mp-chip.on { background:var(--color-slate-700); color:#fff; border-color:var(--color-slate-700); }
  .mp-list { max-height:45vh; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
  .mp-row { display:flex; align-items:center; gap:10px; padding:10px; border:1px solid var(--color-slate-200); border-radius:var(--radius-md); cursor:pointer; min-height:48px; }
  .mp-row:hover { border-color:var(--color-blue-400); background:var(--color-slate-50); }
  .mp-row-ic { font-size:20px; }
  .mp-row-bd { flex:1; min-width:0; }
  .mp-row-nm { font-size:var(--text-sm); font-weight:600; color:var(--color-slate-800); }
  .mp-row-meta { font-size:10px; color:var(--color-slate-500); display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
  .mp-row-stk { font-size:var(--text-sm); font-weight:700; color:var(--color-slate-700); white-space:nowrap; }
  .mp-row-stk.zero { color:var(--color-error-600); } .mp-row-stk.low { color:var(--color-warning-700); }
  .mp-empty { text-align:center; color:var(--color-slate-400); font-size:var(--text-xs); padding:var(--space-6); line-height:1.6; }
  .mp-add { width:100%; padding:10px; border:1px dashed var(--color-blue-400); background:var(--color-blue-50); color:var(--color-blue-700); border-radius:var(--radius-md); font-size:var(--text-xs); font-weight:600; cursor:pointer; font-family:inherit; margin-top:8px; }

  /* Bill scan */
  .bs-preview-img { max-width:100%; max-height:150px; border-radius:var(--radius-md); display:block; margin:var(--space-2) auto; }
  .bs-info-box { background:var(--color-slate-50); border-radius:var(--radius-md); padding:10px; margin:var(--space-2) 0; text-align:left; }
  .bs-info-row { display:flex; justify-content:space-between; font-size:11px; color:var(--color-slate-600); padding:1px 0; }
  .bs-item { border:1px solid var(--color-slate-200); border-radius:var(--radius-md); padding:8px; margin-bottom:6px; text-align:left; }
  .bs-item.err { border-color:#fecaca; background:var(--color-error-50); } .bs-item.warn { border-color:#fde68a; background:var(--color-warning-50); }
  .bs-item-r { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
  .bs-item-conf { font-size:10px; font-weight:700; padding:1px 6px; border-radius:var(--radius-full); }
  .bs-conf-h { background:var(--color-success-50); color:var(--color-success-700); } .bs-conf-m { background:var(--color-warning-50); color:var(--color-warning-700); } .bs-conf-l { background:var(--color-error-50); color:var(--color-error-700); }
  .bs-item-raw { font-size:var(--text-xs); color:var(--color-slate-700); }
  .bs-item-matched { font-size:11px; color:var(--color-slate-600); margin-bottom:4px; }
  .bs-item-edit { display:grid; grid-template-columns:1fr; gap:4px; }
  .bs-item-edit select, .bs-item-edit input { padding:7px 9px; border:1px solid var(--color-slate-300); border-radius:var(--radius-md); font-size:var(--text-xs); font-family:inherit; }
  @media(min-width:420px){ .bs-item-edit { grid-template-columns:2fr 1fr 1fr; } }

  /* Delete material modal */
  .del-opt { width:100%; padding:12px; border:1px solid var(--color-slate-300); background:#fff; border-radius:var(--radius-md); font-size:var(--text-sm); font-weight:600; cursor:pointer; font-family:inherit; }
  .del-opt.deact { background:var(--color-warning-50); border-color:var(--color-warning-500); color:var(--color-warning-700); }
  .del-opt.hard { background:none; border:none; color:var(--color-error-600); }
  .del-opt-hint { font-size:11px; color:var(--color-slate-500); margin:6px 0; line-height:1.5; text-align:center; }
</style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div id="loadingScreen" class="loading-center" style="min-height:60vh"><div class="spinner"></div> กำลังโหลดข้อมูลวัสดุ...</div>

      <div class="page-content" id="mainContent" style="display:none">
        <div class="mat-subhdr">
          <div>
            <h1>วัสดุ / สโตร์</h1>
            <div class="mat-subhdr-sub" id="hdrSub">กำลังโหลด...</div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="openNewMaterialModal('')"><i data-lucide="plus"></i> เพิ่มวัสดุ</button>
        </div>

        <div id="aiBnr" style="display:none"></div>

        <div class="mat-tabs">
          <button class="mat-tab on" id="matTab-stock" onclick="switchTab('stock', this)"><i data-lucide="boxes"></i> Stock</button>
          <button class="mat-tab" id="matTab-rcv" onclick="switchTab('rcv', this)"><i data-lucide="package-plus"></i> รับ</button>
          <button class="mat-tab" id="matTab-wdr" onclick="switchTab('wdr', this)"><i data-lucide="package-minus"></i> เบิก</button>
          <button class="mat-tab" id="matTab-cnt" onclick="switchTab('cnt', this)"><i data-lucide="clipboard-list"></i> นับ</button>
          <button class="mat-tab" id="matTab-hist" onclick="switchTab('hist', this)"><i data-lucide="history"></i> ประวัติ</button>
        </div>

        <!-- TAB: Stock -->
        <div id="tab-stock" class="mat-tab-pane on">
          <div class="stk-filter" id="stkFilter">
            <button class="stk-f-btn on" onclick="setStockFilter('all',this)">ทั้งหมด</button>
            <button class="stk-f-btn" onclick="setStockFilter('low',this)">⚠ เหลือน้อย</button>
            <button class="stk-f-btn" onclick="setStockFilter('ไม้แผ่น',this)">ไม้แผ่น</button>
            <button class="stk-f-btn" onclick="setStockFilter('ไฟฟ้า',this)">ไฟฟ้า</button>
            <button class="stk-f-btn" onclick="setStockFilter('ฮาร์ดแวร์',this)">ฮาร์ดแวร์</button>
            <button class="stk-f-btn" onclick="setStockFilter('กาว',this)">กาว</button>
            <button class="stk-f-btn" onclick="setStockFilter('วัสดุสิ้นเปลือง',this)">สิ้นเปลือง</button>
          </div>
          <div id="stockList"></div>
        </div>

        <!-- TAB: รับ (Receive) -->
        <div id="tab-rcv" class="mat-tab-pane">
          <div class="card card-body mf-form">
            <button class="bill-scan-btn" onclick="document.getElementById('billInput').click()"><i data-lucide="scan-line"></i> สแกนบิลด้วย AI</button>
            <input id="billInput" type="file" accept="image/*" style="display:none" onchange="onBillSelected(event)">
            <div class="bill-divider">หรือกรอกเอง</div>
            <div class="mf-grp">
              <label class="mf-lb">วัสดุ</label>
              <input type="hidden" id="rcvMat">
              <button type="button" id="rcvMatBtn" class="mat-pick-btn placeholder" onclick="openMatPicker(onRcvMatPicked)"><span id="rcvMatLabel">— เลือกวัสดุ —</span><span class="mpb-caret">🔍 ▾</span></button>
            </div>
            <div id="rcvCountFields" class="mf-row">
              <div class="mf-grp"><label class="mf-lb">จำนวน</label><input id="rcvQty" type="number" min="1" class="mf-in" placeholder="0"></div>
              <div class="mf-grp"><label class="mf-lb">ราคา/หน่วย</label><input id="rcvPrice" type="number" min="0" class="mf-in" placeholder="0 (ถ้าทราบ)"></div>
            </div>
            <div id="rcvStatusFields" class="mf-grp" style="display:none">
              <label class="mf-lb">รับเข้าแล้วสถานะเป็น</label>
              <div class="rcv-status-btns">
                <button type="button" class="rsb s3" data-v="3" onclick="setRcvStatus(3,this)">🟢 เต็ม</button>
                <button type="button" class="rsb s2" data-v="2" onclick="setRcvStatus(2,this)">🔵 ใช้ได้</button>
                <button type="button" class="rsb s1" data-v="1" onclick="setRcvStatus(1,this)">🟡 ใกล้หมด</button>
                <button type="button" class="rsb s0" data-v="0" onclick="setRcvStatus(0,this)">🔴 หมด</button>
              </div>
              <div id="rcvStatusSel" class="nm-hint">ยังไม่เลือก</div>
            </div>
            <div class="mf-grp"><label class="mf-lb">เลขที่ใบเสร็จ/ใบส่งของ</label><input id="rcvReceipt" type="text" class="mf-in" placeholder="เช่น IV6905126"></div>
            <div class="mf-grp"><label class="mf-lb">หมายเหตุ</label><input id="rcvNotes" type="text" class="mf-in" placeholder="(ไม่บังคับ)"></div>
            <button class="mf-submit" onclick="submitReceive()"><i data-lucide="package-plus"></i> บันทึกการรับ</button>
          </div>
        </div>
        <!-- TAB: เบิก (Withdraw) -->
        <div id="tab-wdr" class="mat-tab-pane">
          <div class="card card-body mf-form">
            <div class="mf-grp">
              <label class="mf-lb">วัสดุ</label>
              <input type="hidden" id="wdrMat">
              <button type="button" id="wdrMatBtn" class="mat-pick-btn placeholder" onclick="openMatPicker(onWdrMatPicked)"><span id="wdrMatLabel">— เลือกวัสดุ —</span><span class="mpb-caret">🔍 ▾</span></button>
            </div>
            <div class="mf-row">
              <div class="mf-grp"><label class="mf-lb">ผู้เบิก (ทีม)</label><select id="wdrCtr" class="mf-in"></select></div>
              <div class="mf-grp"><label class="mf-lb">จำนวน</label><input id="wdrQty" type="number" min="1" class="mf-in" placeholder="0"></div>
            </div>
            <div class="mf-grp"><label class="mf-lb">FF Code (งานที่ใช้)</label><select id="wdrFF" class="mf-in"></select></div>

            <button class="mf-submit" onclick="submitWithdraw()"><i data-lucide="package-minus"></i> บันทึกการเบิก</button>

        <div id="tab-cnt" class="mat-tab-pane">
          <div class="card card-body mf-form">
            <div class="mf-grp">
              <label class="mf-lb">วัสดุ</label>
              <input type="hidden" id="cntMat">
              <button type="button" id="cntMatBtn" class="mat-pick-btn placeholder" onclick="openMatPicker(onCntMatPicked)"><span id="cntMatLabel">— เลือกวัสดุ —</span><span class="mpb-caret">🔍 ▾</span></button>
            </div>

            <div id="cntStatusInput" class="mf-grp" style="display:none">
              <label class="mf-lb">สถานะปัจจุบัน</label>
              <div class="rcv-status-btns">
                <button type="button" class="rsb s3" onclick="setCntStatus(3)">🟢 เต็ม</button>
                <button type="button" class="rsb s2" onclick="setCntStatus(2)">🔵 ใช้ได้</button>
                <button type="button" class="rsb s1" onclick="setCntStatus(1)">🟡 ใกล้หมด</button>
                <button type="button" class="rsb s0" onclick="setCntStatus(0)">🔴 หมด</button>
              </div>
              <div id="cntStatusSel" class="nm-hint">ยังไม่เลือก</div>

              <label class="mf-lb">📷 แนบรูป (ไม่บังคับ)</label>
              <button id="cntPhotoBtn" type="button" class="photo-btn" onclick="document.getElementById('cntPhotoInput').click()"><span>📷</span> ถ่ายรูป/เลือกรูป</button>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/state.js"></script>
  <script src="../js/modal.js"></script>
  <script src="../vendor/lucide/lucide.min.js"></script>
  <script src="../js/shell.js"></script>
  <script>
  if (!Auth.requireAuth('admin')) { /* redirect */ }
  Shell.render({ page: 'materials', title: 'วัสดุ / สโตร์', scope: 'project' });

  const matState = {
    materials:[], contractors:[], teams:[], ffs:[], alerts:[],
    stockFilter:'all', parsedItems:[], parsedClarif:[], cntSelectedStatus:null, countPhotos:[],
  };

  async function loadAll(){
    try{
      const [matsRes, ctrsRes, teamsRes, ffsRes, alertsRes] = await Promise.all([
        API.callRead('get_materials'), API.callRead('get_contractors'), API.callRead('get_teams'), API.callRead('get_ff_list'), API.callRead('get_ai_alerts'),
      ]);
      matState.materials=(matsRes.ok&&matsRes.data)?matsRes.data:[];
      matState.contractors=(ctrsRes.ok&&ctrsRes.data)?ctrsRes.data:[];
      matState.teams=(teamsRes.ok&&teamsRes.data)?teamsRes.data:[];
      matState.ffs=(ffsRes.ok&&ffsRes.data)?ffsRes.data:[];
      matState.alerts=(alertsRes.ok&&alertsRes.data)?alertsRes.data:[];
      let projName='Bow House';
      try{ const pjRes=await API.getProjects(); if(pjRes&&pjRes.ok&&Array.isArray(pjRes.data)){ const p=pjRes.data.find(p=>p.project_id===state.projectId); if(p&&p.name) projName=p.name; } }catch(e){}
      document.getElementById('hdrSub').textContent=`${projName} · ${matState.materials.length} รายการ`;
      renderAlerts(); renderStock(); populateSelects();
      document.getElementById('loadingScreen').style.display='none';
      document.getElementById('mainContent').style.display='block';
      if(window.lucide) lucide.createIcons();
    }catch(err){ document.getElementById('loadingScreen').innerHTML='❌ โหลดข้อมูลไม่สำเร็จ<br><small>'+err.message+'</small>'; }
  }

  function switchTab(name,btn){
    document.querySelectorAll('.mat-tab').forEach(t=>t.classList.remove('on'));
    document.querySelectorAll('.mat-tab-pane').forEach(p=>p.classList.remove('on'));
    if(btn) btn.classList.add('on');
    const pane=document.getElementById('tab-'+name); if(pane) pane.classList.add('on');
    if(window.lucide) lucide.createIcons();
  }

  // ── AI Alerts ──
  function renderAlerts(){
    const bnr=document.getElementById('aiBnr');
    const critical=matState.alerts.filter(a=>a.severity==='high'||a.severity==='medium');
    if(critical.length===0){ bnr.style.display='none'; return; }
    const msgs=critical.slice(0,3).map(a=>a.mat_name).join(', ');
    const more=critical.length>3?` +${critical.length-3}`:'';
    bnr.className='mat-ai-bnr';
    bnr.innerHTML=`<div class="mat-ai-bnr-i">⚠️</div><div class="mat-ai-bnr-tx"><strong>${critical.length} รายการต้องการความสนใจ${more}</strong><br>${escapeHtml(msgs)}</div>`;
    bnr.style.display='flex'; bnr.onclick=showAlertsModal;
  }
  function showAlertsModal(){
    Modal.show(`<div class="modal-title">🚨 AI Alerts</div><div class="modal-desc">${matState.alerts.length} รายการที่ต้องสนใจ</div><div style="max-height:55vh;overflow-y:auto;margin-top:8px;text-align:left">${matState.alerts.map(a=>`<div style="border-left:3px solid ${a.severity==='high'?'var(--color-error-500)':'var(--color-warning-500)'};padding:8px 12px;margin-bottom:6px;background:var(--color-slate-50);border-radius:6px"><div style="font-size:12px;font-weight:600;color:var(--color-slate-800)">${escapeHtml(a.mat_name)}</div><div style="font-size:11px;color:var(--color-slate-500);margin-top:2px">${escapeHtml(a.message||'')}</div></div>`).join('')}</div><div class="modal-btns"><button class="modal-btn modal-btn-cancel" onclick="Modal.close()">ปิด</button></div>`);
  }

  // ── Stock ──
  function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function getCategoryIcon(cat){ return { 'ไม้แผ่น':'🪵','ไฟฟ้า':'⚡','ฮาร์ดแวร์':'🔩','กาว':'🧴','วัสดุสิ้นเปลือง':'📋' }[cat]||'📦'; }
  function modeBadgeHtml(mode){ return mode==='STATUS'?'<span class="mode-badge status">🚦 สถานะ</span>':'<span class="mode-badge count">🔢 นับ</span>'; }
  function setStockFilter(f,btn){ matState.stockFilter=f; document.querySelectorAll('.stk-f-btn').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); renderStock(); }
  function renderStock(){
    let items=matState.materials.slice();
    const f=matState.stockFilter;
    if(f==='low') items=items.filter(m=>{ if(m.tracking_mode==='STATUS') return Number(m.current_stock)<=1; const s=Number(m.current_stock||0),min=Number(m.min_stock_alert||0); return s===0||(min>0&&s<=min); });
    else if(f!=='all') items=items.filter(m=>m.category===f);
    if(items.length===0){ document.getElementById('stockList').innerHTML='<div class="empty"><div class="empty-i">📦</div>ไม่มีรายการ</div>'; return; }
    let html='';
    items.forEach(m=>{
      const stock=Number(m.current_stock||0), min=Number(m.min_stock_alert||0);
      const isStatus=m.tracking_mode==='STATUS';
      const badge=modeBadgeHtml(m.tracking_mode);
      let cardClass='', stockHtml='', statusRow='';
      if(isStatus){
        const lbl=['🔴 หมด','🟡 ใกล้หมด','🔵 ใช้ได้','🟢 เต็ม'][stock]||'?';
        stockHtml=`<div class="stk-status-${stock}">${lbl}</div>`;
        if(stock===0)cardClass='zero'; else if(stock===1)cardClass='low';
        const sdef=[{v:3,ic:'🟢',t:'เต็ม'},{v:2,ic:'🔵',t:'ใช้ได้'},{v:1,ic:'🟡',t:'ใกล้หมด'},{v:0,ic:'🔴',t:'หมด'}];
        statusRow=`<div class="stk-status-btns" onclick="event.stopPropagation()">`+sdef.map(s=>`<button class="ssb s${s.v} ${stock===s.v?'on':''}" data-mat="${escapeHtml(m.id)}" data-v="${s.v}" onclick="quickSetStatus('${escapeHtml(m.id)}',${s.v},this)"><span class="ssb-ic">${s.ic}</span><span>${s.t}</span></button>`).join('')+`</div>`;
      } else {
        if(stock===0)cardClass='zero'; else if(min>0&&stock<=min)cardClass='low';
        stockHtml=`<div class="stk-card-stk">${stock}<span class="stk-card-unit"> ${escapeHtml(m.unit||'')}</span></div>`;
      }
      html+=`<div class="stk-card ${cardClass}" data-mat="${escapeHtml(m.id)}"><div class="stk-card-main" onclick="showMatDetail('${escapeHtml(m.id)}')"><div class="stk-card-icon">${getCategoryIcon(m.category)}</div><div class="stk-card-bd"><div class="stk-card-nm">${escapeHtml(m.name)} ${badge}</div><div class="stk-card-meta">${escapeHtml(m.category||'')} · ${escapeHtml(m.id)}${m.spec?' · '+escapeHtml(m.spec):''}${m.size?' · '+escapeHtml(m.size):''}</div></div>${stockHtml}</div>${statusRow}<div class="stk-card-acts" onclick="event.stopPropagation()"><button class="stk-act edit" onclick="openEditMaterialModal('${escapeHtml(m.id)}')">✏️ แก้ไข</button><button class="stk-act del" onclick="openDeleteMaterialModal('${escapeHtml(m.id)}')">🗑 ลบ</button></div></div>`;
    });
    document.getElementById('stockList').innerHTML=html;
  }
  async function quickSetStatus(matId,v,btn){
    const m=matState.materials.find(x=>x.id===matId); if(!m) return;
    const prev=Number(m.current_stock||0); if(prev===v) return;
    const lbls=['🔴 หมด','🟡 ใกล้หมด','🔵 ใช้ได้','🟢 เต็ม'];
    const group=btn.parentNode;
    m.current_stock=v;
    group.querySelectorAll('.ssb').forEach(b=>{ b.classList.toggle('on',Number(b.dataset.v)===v); b.classList.add('saving'); });
    Modal.toast('กำลังบันทึก '+lbls[v]+'...');
    try{
      await API.changeMaterialStatus(matId,v);
      setTimeout(()=>{ Modal.toast('✓ '+m.name+' → '+lbls[v]); group.querySelectorAll('.ssb').forEach(b=>b.classList.remove('saving')); renderStock(); },1200);
    }catch(err){ m.current_stock=prev; group.querySelectorAll('.ssb').forEach(b=>{ b.classList.toggle('on',Number(b.dataset.v)===prev); b.classList.remove('saving'); }); Modal.toast('❌ บันทึกไม่สำเร็จ — คืนค่าเดิม'); }
  }

  async function showMatDetail(matId){
    const m=matState.materials.find(x=>x.id===matId); if(!m) return;
    const isStatus=m.tracking_mode==='STATUS';
    const stock=Number(m.current_stock||0);
    const stockDisplay=isStatus?['🔴 หมด','🟡 ใกล้หมด','🔵 ใช้ได้','🟢 เต็ม'][stock]:(stock+' '+(m.unit||''));
    const renderModal=(photos)=>{
      let galleryHtml='<div class="mat-gallery">';
      photos.forEach(p=>{ galleryHtml+=`<div class="mat-gallery-item" onclick="viewPhoto('${escapeHtml(p.drive_url)}','${escapeHtml(p.photo_id)}','${escapeHtml(matId)}')"><img src="${escapeHtml(p.thumbnail)}" alt="${escapeHtml(p.caption||'')}" loading="lazy" onerror="this.src='${escapeHtml(p.drive_url)}'"></div>`; });
      galleryHtml+=`<div class="mat-gallery-item add" onclick="document.getElementById('matPhotoInput_${escapeHtml(matId)}').click()">+</div></div><input id="matPhotoInput_${escapeHtml(matId)}" type="file" accept="image/*" style="display:none" onchange="onMatPhotoSelected(event,'${escapeHtml(matId)}')">`;
      const modeTxt=isStatus?'🚦 นับสถานะ':'🔢 นับจำนวน';
      Modal.show(`<div class="modal-title">${escapeHtml(m.name)} ${modeBadgeHtml(m.tracking_mode)}</div><div class="modal-desc">${escapeHtml(m.id)} · ${escapeHtml(m.category||'')}</div><div class="modal-info" style="text-align:left">
        <div class="modal-info-row"><span class="modal-info-key">หน่วย:</span><span class="modal-info-val">${escapeHtml(m.unit||'')}</span></div>
        <div class="modal-info-row"><span class="modal-info-key">สต๊อก:</span><span class="modal-info-val">${stockDisplay}</span></div>
        <div class="modal-info-row"><span class="modal-info-key">โหมด:</span><span class="modal-info-val">${modeTxt}</span></div>
        ${m.spec?`<div class="modal-info-row"><span class="modal-info-key">สเปก:</span><span class="modal-info-val">${escapeHtml(m.spec)}</span></div>`:''}
        ${m.size?`<div class="modal-info-row"><span class="modal-info-key">ขนาด:</span><span class="modal-info-val">${escapeHtml(m.size)}</span></div>`:''}
        ${m.default_supplier_id?`<div class="modal-info-row"><span class="modal-info-key">ซัพพลายเออร์:</span><span class="modal-info-val">${escapeHtml(m.default_supplier_id)}</span></div>`:''}
        ${Number(m.default_price)>0?`<div class="modal-info-row"><span class="modal-info-key">ราคา/หน่วย:</span><span class="modal-info-val">${Number(m.default_price).toLocaleString()} ฿</span></div>`:''}
        ${!isStatus&&m.min_stock_alert?`<div class="modal-info-row"><span class="modal-info-key">เตือนที่:</span><span class="modal-info-val">${escapeHtml(m.min_stock_alert)} ${escapeHtml(m.unit||'')}</span></div>`:''}
        ${m.notes?`<div class="modal-info-row"><span class="modal-info-key">หมายเหตุ:</span><span class="modal-info-val">${escapeHtml(m.notes)}</span></div>`:''}
      </div><div style="margin-top:14px"><div style="font-size:11px;font-weight:600;color:var(--color-slate-600);margin-bottom:6px">📷 รูปอ้างอิง ${photos.length>0?`(${photos.length})`:''}</div>${galleryHtml}</div>
      <div class="modal-btns" style="margin-top:14px"><button class="modal-btn modal-btn-warn" onclick="openDeleteMaterialModal('${escapeHtml(matId)}')">🗑 ลบ</button><button class="modal-btn modal-btn-primary" onclick="openEditMaterialModal('${escapeHtml(matId)}')">✏️ แก้ไข</button></div>
      <div style="margin-top:8px;text-align:center"><button style="background:none;border:none;color:var(--color-slate-400);font-size:12px;font-family:inherit;cursor:pointer;padding:4px" onclick="Modal.close()">ปิด</button></div>`);
    };
    renderModal([]);
    try{ const res=await API.callRead('get_material_photos',{ mat_id:matId }); if(res.ok&&res.data) renderModal(res.data); }catch(err){}
  }

  function compressImage(file,maxDim=1280,quality=0.8){
    return new Promise((resolve,reject)=>{ const rd=new FileReader(); rd.onload=(e)=>{ const img=new Image(); img.onload=()=>{ let w=img.width,h=img.height; if(w>h&&w>maxDim){h=h*(maxDim/w);w=maxDim;} else if(h>maxDim){w=w*(maxDim/h);h=maxDim;} const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); resolve(c.toDataURL('image/jpeg',quality)); }; img.onerror=reject; img.src=e.target.result; }; rd.onerror=reject; rd.readAsDataURL(file); });
  }
  async function onMatPhotoSelected(e,matId){
    const file=e.target.files[0]; if(!file) return;
    Modal.toast('📷 กำลังอัปโหลดรูป...');
    try{ const base64=await compressImage(file); await API.callPost('upload_photo',{ image_base64:base64, linked_to:'material', link_id:matId, caption:'', uploaded_by:'admin' }); Modal.toast('✓ อัปโหลดแล้ว'); setTimeout(()=>{ Modal.close(); showMatDetail(matId); },1000); }
    catch(err){ Modal.toast('❌ '+err.message); }
    e.target.value='';
  }
  function viewPhoto(url,photoId,matId){
    Modal.show(`<div style="text-align:center"><img src="${escapeHtml(url)}" style="max-width:100%;max-height:60vh;border-radius:8px;object-fit:contain;background:#000"></div><div class="modal-btns"><button class="modal-btn modal-btn-warn" onclick="deleteThisPhoto('${escapeHtml(photoId)}','${escapeHtml(matId)}')">🗑 ลบ</button><button class="modal-btn modal-btn-primary" onclick="Modal.close();showMatDetail('${escapeHtml(matId)}')">ปิด</button></div>`);
  }
  async function deleteThisPhoto(photoId,matId){
    const ok=await Modal.confirm({icon:'🗑️',iconClass:'warn',title:'ยืนยันลบรูปนี้?',confirmText:'ลบ',cancelText:'ยกเลิก',confirmClass:'modal-btn-warn'});
    if(!ok) return;
    Modal.toast('กำลังลบ...');
    try{ await API.callPost('delete_photo',{ photo_id:photoId }); Modal.toast('✓ ลบแล้ว'); setTimeout(()=>{ Modal.close(); showMatDetail(matId); },1000); }
    catch(err){ Modal.toast('❌ '+err.message); }
  }

  function escapeAttr(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // ══════════════════ Chapter 2: populate selects ══════════════════
  function populateSelects(){
    ['rcv','wdr','cnt'].forEach(syncMatPickLabel);
    const teamOpts=matState.teams.map(t=>`<option value="${escapeAttr(t.team_id)}">${escapeHtml(t.name)}${t.type?' ('+escapeHtml(t.type)+')':''}</option>`).join('');
    const wdrCtr=document.getElementById('wdrCtr'); if(wdrCtr) wdrCtr.innerHTML='<option value="">— เลือก —</option>'+teamOpts;
    const ffOpts=matState.ffs.map(f=>`<option value="${escapeAttr(f.code)}">${escapeHtml(f.code)} - ${escapeHtml(f.name)}</option>`).join('');
    const wdrFF=document.getElementById('wdrFF'); if(wdrFF) wdrFF.innerHTML='<option value="">— เลือก FF —</option>'+ffOpts;
  }

  // ══════════════════ Chapter 2: material picker ══════════════════
  matState.picker={ onPick:null, q:'', cat:'all', filterMode:'' };
  function openMatPicker(onPick,opts){
    opts=opts||{};
    matState.picker={ onPick, q:'', cat:'all', filterMode:opts.filterMode||'' };
    const cats=['all'].concat(Array.from(new Set(matState.materials.map(m=>m.category).filter(Boolean))));
    const chipHtml=cats.map(c=>`<button class="mp-chip ${c==='all'?'on':''}" data-cat="${escapeAttr(c)}" onclick="setMatPickerCat('${escapeAttr(c).replace(/'/g,'&#39;')}',this)">${c==='all'?'ทั้งหมด':escapeHtml(String(c))}</button>`).join('');
    Modal.show(`<div class="modal-title">เลือกวัสดุ</div><div class="mp-wrap"><input id="mpSearch" class="mp-search" type="text" placeholder="🔍 ค้นหาชื่อ / รหัส / สเปก" oninput="onMatPickerSearch(this.value)" autocomplete="off"><div class="mp-chips">${chipHtml}</div><div id="mpList" class="mp-list"></div><button class="mp-add" id="mpAddBtn" onclick="addMaterialFromPicker()">➕ เพิ่มวัสดุใหม่</button></div><div class="modal-btns" style="margin-top:12px"><button class="modal-btn modal-btn-cancel" onclick="Modal.close()">ปิด</button></div>`,'pay-modal');
    renderMatPickerList();
    setTimeout(()=>{ const s=document.getElementById('mpSearch'); if(s) s.focus(); },80);
  }
  function onMatPickerSearch(v){ matState.picker.q=String(v||'').trim().toLowerCase(); renderMatPickerList(); }
  function setMatPickerCat(cat,btn){ matState.picker.cat=cat; document.querySelectorAll('.mp-chip').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); renderMatPickerList(); }
  function renderMatPickerList(){
    const p=matState.picker;
    let list=matState.materials.filter(m=>m.active!==false);
    if(p.filterMode){ const want=p.filterMode==='STATUS'?'STATUS':'COUNT'; list=list.filter(m=>(m.tracking_mode==='STATUS'?'STATUS':'COUNT')===want); }
    if(p.cat!=='all') list=list.filter(m=>m.category===p.cat);
    if(p.q) list=list.filter(m=>[m.id,m.name,m.spec,m.size,m.category].map(x=>String(x||'').toLowerCase()).join(' ').indexOf(p.q)>=0);
    const el=document.getElementById('mpList'); if(!el) return;
    if(list.length===0){ el.innerHTML='<div class="mp-empty">ไม่พบวัสดุที่ตรงกับคำค้น<br>กด "➕ เพิ่มวัสดุใหม่" ด้านล่างได้เลย</div>'; }
    else el.innerHTML=list.map(m=>{
      const isStatus=m.tracking_mode==='STATUS'; const stk=Number(m.current_stock||0), min=Number(m.min_stock_alert||0);
      let stkCls='', stkTxt;
      if(isStatus){ stkTxt=['🔴 หมด','🟡 ใกล้หมด','🔵 ใช้ได้','🟢 เต็ม'][stk]||'?'; if(stk===0)stkCls='zero'; else if(stk===1)stkCls='low'; }
      else{ if(stk===0)stkCls='zero'; else if(min>0&&stk<=min)stkCls='low'; stkTxt=stk+' <small>'+escapeHtml(m.unit||'')+'</small>'; }
      const sub=[m.id,m.spec,m.size].filter(Boolean).map(x=>escapeHtml(String(x))).join(' · ');

    let data;
    if(isStatus){ if(matState.rcvSelectedStatus===null||matState.rcvSelectedStatus===undefined){ Modal.toast('กรุณาเลือกสถานะหลังรับเข้า'); return; } data={ material_id:matId, new_stock:matState.rcvSelectedStatus, receipt_no:document.getElementById('rcvReceipt').value, notes:document.getElementById('rcvNotes').value }; }
    else { data={ material_id:matId, quantity:document.getElementById('rcvQty').value, unit_price:document.getElementById('rcvPrice').value||0, receipt_no:document.getElementById('rcvReceipt').value, notes:document.getElementById('rcvNotes').value }; if(!data.quantity){ Modal.toast('กรุณาใส่จำนวน'); return; } }
    Modal.toast('กำลังบันทึก...');

  // ══════════════════ Chapter 2: สแกนบิล AI ══════════════════
  matState.scannedBill=null;
  async function onBillSelected(e){
    const file=e.target.files[0]; if(!file) return; e.target.value='';
    const previewUrl=URL.createObjectURL(file);
    Modal.show(`<div class="modal-title">🤖 AI กำลังอ่านบิล</div><div class="modal-desc">กรุณารอสักครู่...</div><img src="${previewUrl}" class="bs-preview-img"><div style="text-align:center;padding:20px"><div class="spinner"></div><div style="font-size:12px;color:var(--color-slate-500);margin-top:8px">กำลังวิเคราะห์ด้วย Gemini Vision...</div></div>`);
    try{ const base64=await compressImage(file,1600,0.85); const res=await API.callPost('scan_bill',{ image_base64:base64, uploaded_by:'admin' }); if(!res.ok) throw new Error(res.error||'AI failed'); matState.scannedBill=res.data; renderBillScanResult(res.data,previewUrl); }
    catch(err){ Modal.show(`<div class="modal-icon warn">⚠️</div><div class="modal-title">อ่านบิลไม่สำเร็จ</div><div class="modal-desc">${escapeHtml(err.message)}<br>กรุณาลองอีกครั้ง หรือกรอกข้อมูลเอง</div><div class="modal-btns"><button class="modal-btn modal-btn-primary" onclick="Modal.close()">ปิด</button></div>`); }
  }
  function renderBillScanResult(data,previewUrl){
    const items=data.items||[];
    if(items.length===0){ Modal.show(`<div class="modal-icon warn">⚠️</div><div class="modal-title">AI ไม่พบรายการในบิล</div><div class="modal-desc">ลองถ่ายใหม่ให้ชัดขึ้น หรือกรอกข้อมูลเอง</div><div class="modal-btns"><button class="modal-btn modal-btn-primary" onclick="Modal.close()">ปิด</button></div>`); return; }
    const matOpts=matState.materials.map(m=>`<option value="${escapeAttr(m.id)}">${escapeHtml(m.id)} - ${escapeHtml(m.name)}</option>`).join('');
    let itemsHtml='';
    items.forEach((item,i)=>{
      const conf=Number(item.match_confidence||0); let confClass='bs-conf-l'; if(conf>=0.85)confClass='bs-conf-h'; else if(conf>=0.7)confClass='bs-conf-m';
      const itemClass=!item.matched_material_id?'err':(item.needs_review?'warn':'');
      itemsHtml+=`<div class="bs-item ${itemClass}" data-idx="${i}"><div class="bs-item-r"><span class="bs-item-conf ${confClass}">${Math.round(conf*100)}%</span><span class="bs-item-raw">📄 ${escapeHtml(item.raw_name||'')}</span></div>${item.matched_material_id?`<div class="bs-item-matched">→ <strong>${escapeHtml(item.matched_material_name||'')}</strong></div>`:'<div class="bs-item-matched" style="color:var(--color-error-600)">❌ ไม่พบใน Master List</div>'}<div class="bs-item-edit"><select data-field="material_id" onchange="updateBillItem(${i},'material_id',this.value)"><option value="">— เลือก —</option>${matOpts}</select><input type="number" min="0" step="0.01" placeholder="จำนวน" value="${item.quantity||''}" data-field="quantity" onchange="updateBillItem(${i},'quantity',this.value)"><input type="number" min="0" placeholder="ราคา/หน่วย" value="${item.unit_price||''}" data-field="unit_price" onchange="updateBillItem(${i},'unit_price',this.value)"></div></div>`;
    });
    Modal.show(`<div class="modal-title">🤖 AI พบ ${items.length} รายการ</div><div class="modal-desc">ตรวจสอบและแก้ไขก่อนยืนยัน</div><img src="${escapeAttr(previewUrl||data.bill_thumbnail||'')}" class="bs-preview-img"><div class="bs-info-box"><div class="bs-info-row"><span>เลขที่บิล:</span><strong>${escapeHtml(data.invoice_no||'-')}</strong></div><div class="bs-info-row"><span>วันที่:</span><strong>${escapeHtml(data.date||'-')}</strong></div><div class="bs-info-row"><span>ร้านค้า:</span><strong>${escapeHtml(data.supplier||'-')}</strong></div><div class="bs-info-row"><span>ยอดรวม:</span><strong>${(data.total||0).toLocaleString()} ฿</strong></div></div><div style="max-height:35vh;overflow-y:auto">${itemsHtml}</div><div class="modal-btns"><button class="modal-btn modal-btn-cancel" onclick="cancelBillScan()">ยกเลิก</button><button class="modal-btn modal-btn-primary" onclick="confirmBillScan()">✓ ยืนยัน ${items.length} รายการ</button></div>`,'pay-modal');
    setTimeout(()=>{ items.forEach((item,i)=>{ const card=document.querySelector(`.bs-item[data-idx="${i}"]`); if(!card) return; const sel=card.querySelector('select'); if(sel&&item.matched_material_id) sel.value=item.matched_material_id; }); },50);
  }
  function updateBillItem(idx,field,value){ if(!matState.scannedBill||!matState.scannedBill.items[idx]) return; matState.scannedBill.items[idx][field]=(field==='quantity'||field==='unit_price')?Number(value):value; if(field==='material_id') matState.scannedBill.items[idx].matched_material_id=value; }

    Modal.toast('กำลังบันทึก '+items.length+' รายการ...');
    const res=await API.callPost('confirm_bill_items',{ bill_photo_id:matState.scannedBill.bill_photo_id, invoice_no:matState.scannedBill.invoice_no, items:JSON.stringify(items) });
    Modal.toast(res.ok?'✓ บันทึกสำเร็จ '+items.length+' รายการ':'⚠️ '+(res.error||'ดูใน Sheets'));
    setTimeout(async()=>{ Modal.close(); matState.scannedBill=null; await loadAll(); },1500);
  }

  // ══════════════════ Chapter 2: เพิ่ม/แก้/ลบ วัสดุ ══════════════════
  const NM_CATEGORIES=['ไม้แผ่น','ไม้โครง','ไฟฟ้า','ฮาร์ดแวร์','กาว','วัสดุสิ้นเปลือง','อื่นๆ'];
  matState.nm={ mode:'COUNT', onCreated:null, edit:null, origMode:null };

  function renderMaterialModal(mat,prefillName,onCreated){
    const isEdit=!!mat;
    const startMode=isEdit?(mat.tracking_mode==='STATUS'?'STATUS':'COUNT'):'COUNT';
    matState.nm={ mode:startMode, onCreated:onCreated||null, edit:isEdit?mat:null, origMode:isEdit?startMode:null, hasStock:isEdit?(Number(mat.current_stock||0)>0):false };
    const v=(x)=>(x===undefined||x===null)?'':x;

    if(isEdit&&mat.category&&catList.indexOf(mat.category)<0) catList.unshift(mat.category);
    const catOpts=catList.map(c=>`<option value="${escapeAttr(c)}" ${isEdit&&mat.category===c?'selected':''}>${escapeHtml(c)}</option>`).join('');
    const noteBox=isEdit?`<div class="nm-prefill">✏️ แก้ไขวัสดุ <strong>${escapeHtml(mat.id)}</strong> — เปลี่ยนเฉพาะที่ต้องการ</div>`:(prefillName?`<div class="nm-prefill">💡 เพิ่มวัสดุจากที่พิมพ์ไว้ — ตรวจสอบ/แก้ไขให้ถูกต้องก่อนบันทึก</div>`:'');
    Modal.show(`<div class="modal-title">${isEdit?'✏️ แก้ไขวัสดุ':'➕ เพิ่มวัสดุใหม่'}</div><div class="modal-desc">${isEdit?'ปรับข้อมูลวัสดุแล้วบันทึก':'กรอกข้อมูลวัสดุเพื่อเพิ่มเข้าระบบ'}</div>${noteBox}<div class="mf-form" style="text-align:left">
      <div class="mf-grp"><label class="mf-lb">ชื่อวัสดุ <span class="nm-req">*</span></label><input id="nmName" type="text" class="mf-in" placeholder="เช่น ไม้ HMR 18 มิล" value="${escapeAttr(nmVal)}"></div>

      <div class="mf-row"><div class="mf-grp"><label class="mf-lb">สเปก</label><input id="nmSpec" type="text" class="mf-in" placeholder="เช่น เกรด A, กันชื้น" value="${isEdit?escapeAttr(v(mat.spec)):''}"></div><div class="mf-grp"><label class="mf-lb">ขนาด</label><input id="nmSize" type="text" class="mf-in" placeholder="เช่น 18 มิล, 4x8" value="${isEdit?escapeAttr(v(mat.size)):''}"></div></div>
      <div class="mf-grp"><label class="mf-lb">ซัพพลายเออร์ <span style="color:var(--color-slate-400);font-weight:400">(ไม่บังคับ)</span></label><input id="nmSupplier" type="text" class="mf-in" placeholder="ชื่อร้าน/ผู้ขาย" value="${isEdit?escapeAttr(v(mat.default_supplier_id)):''}"></div>
      <div class="mf-grp"><label class="mf-lb">โหมดติดตามสต๊อก <span class="nm-req">*</span></label><div class="nm-mode"><button type="button" class="nm-mode-opt ${startMode==='COUNT'?'on':''}" id="nmModeCount" onclick="selectNmMode('COUNT')"><div class="nm-mode-ic">🔢</div><div class="nm-mode-nm">นับจำนวน</div><div class="nm-mode-ds">นับเป็นตัวเลข เช่น 25 แผ่น</div></button><button type="button" class="nm-mode-opt ${startMode==='STATUS'?'on':''}" id="nmModeStatus" onclick="selectNmMode('STATUS')"><div class="nm-mode-ic">🚦</div><div class="nm-mode-nm">นับสถานะ</div><div class="nm-mode-ds">เต็ม/ใช้ได้/ใกล้หมด/หมด</div></button></div><div class="nm-hint" id="nmModeHint">เลือกให้ถูกตั้งแต่แรก — มีผลกับวิธีนับสต๊อกของวัสดุนี้</div></div>

  async function selectNmMode(mode,silent){
    const nm=matState.nm;
    if(!silent&&nm.edit&&nm.hasStock&&nm.origMode&&mode!==nm.origMode){
      const ok=await Modal.confirm({icon:'⚠️',iconClass:'warn',title:'เปลี่ยนโหมดวัสดุที่มีสต๊อก?',desc:'วัสดุนี้มีสต๊อกอยู่ — เปลี่ยนโหมด'+(mode==='STATUS'?'เป็น "สถานะ" จะตีความตัวเลขสต๊อกเดิมเป็นสถานะ 0-3':'เป็น "นับจำนวน" จะตีความสถานะเดิมเป็นจำนวน'),confirmText:'ยืนยันเปลี่ยน',cancelText:'ไม่',confirmClass:'modal-btn-warn'});
      if(!ok) return;
    }
    nm.mode=mode;
    document.getElementById('nmModeCount').classList.toggle('on',mode==='COUNT');
    document.getElementById('nmModeStatus').classList.toggle('on',mode==='STATUS');
    const stockInput=document.getElementById('nmStock'), alertGrp=document.getElementById('nmAlertGrp'), hint=document.getElementById('nmModeHint');
    if(mode==='STATUS'){ if(stockInput){ stockInput.value=''; stockInput.disabled=true; stockInput.placeholder='— (ใช้สถานะ)'; } if(alertGrp) alertGrp.style.display='none'; }
    else { if(stockInput){ stockInput.disabled=false; stockInput.placeholder='0'; } if(alertGrp) alertGrp.style.display='block'; }
    if(hint&&nm.edit&&nm.origMode&&mode!==nm.origMode) hint.innerHTML='<span style="color:var(--color-warning-700)">⚠️ เปลี่ยนจากโหมดเดิม — ระบบจะตีความสต๊อกใหม่</span>';
    else if(hint) hint.textContent='เลือกให้ถูกตั้งแต่แรก — มีผลกับวิธีนับสต๊อกของวัสดุนี้';
  }
  async function submitNewMaterial(){
    const isEdit=!!matState.nm.edit;
    const name=document.getElementById('nmName').value.trim(), unit=document.getElementById('nmUnit').value.trim();
    if(!name){ Modal.toast('กรุณาใส่ชื่อวัสดุ'); return; }
    if(!unit){ Modal.toast('กรุณาใส่หน่วย'); return; }
    const dup=matState.materials.find(m=>String(m.name||'').trim().toLowerCase()===name.toLowerCase()&&(!isEdit||m.id!==matState.nm.edit.id));
    if(dup){ Modal.toast('⚠️ มีวัสดุชื่อนี้แล้ว: '+dup.id); return; }
    const mode=matState.nm.mode;
    const fields={ name, unit, category:document.getElementById('nmCat').value, spec:document.getElementById('nmSpec').value.trim(), size:document.getElementById('nmSize').value.trim(), default_supplier_id:document.getElementById('nmSupplier').value.trim(), tracking_mode:mode, default_price:document.getElementById('nmPrice').value||0, min_stock_alert:mode==='STATUS'?0:(document.getElementById('nmAlert').value||0), notes:document.getElementById('nmNotes').value.trim() };
    const btn=document.getElementById('nmSubmit'); btn.disabled=true; btn.innerHTML='<span class="spinner" style="width:13px;height:13px;border-width:2px;display:inline-block;vertical-align:middle"></span> กำลังบันทึก...';
    try{
      if(isEdit){ const res=await API.updateMaterial(matState.nm.edit.id,fields); if(!res.ok) throw new Error(res.error||'บันทึกไม่สำเร็จ'); Modal.toast('✓ บันทึกการแก้ไข "'+name+'" แล้ว'); Modal.close(); await loadAll(); return; }
      const stockEl=document.getElementById('nmStock');
      const payload=Object.assign({},fields,{ current_stock:mode==='STATUS'?0:((stockEl&&stockEl.value)||0) });
      const res=await API.callWrite('create_material',payload); if(!res.ok) throw new Error(res.error||'บันทึกไม่สำเร็จ');
      Modal.toast('✓ เพิ่มวัสดุ "'+name+'" แล้ว'); const onCreated=matState.nm.onCreated; Modal.close(); await loadAll();
      if(typeof onCreated==='function'){ const created=matState.materials.find(m=>String(m.name||'').trim().toLowerCase()===name.toLowerCase()); if(created) onCreated(created); }
    }catch(err){ Modal.toast('❌ '+err.message); btn.disabled=false; btn.innerHTML=isEdit?'💾 บันทึกการแก้ไข':'➕ เพิ่มวัสดุนี้'; }
  }
  function openDeleteMaterialModal(matId){
    const m=matState.materials.find(x=>x.id===matId); if(!m){ Modal.toast('ไม่พบวัสดุ'); return; }
    Modal.show(`<div class="modal-icon warn">🗑</div><div class="modal-title">ลบ "${escapeHtml(m.name)}" ออกจากรายการ?</div><div class="modal-desc">${escapeHtml(m.id)} · ${escapeHtml(m.category||'')}<br>วัสดุจะหายจากทุกรายการ/ช่องเลือก — ประวัติเบิก-รับ-นับยังเก็บไว้ให้รายงาน (กู้คืนได้)</div><button class="del-opt deact" onclick="doDeactivateMaterial('${escapeAttr(matId).replace(/'/g,'&#39;')}')">🗑 ลบออกจากรายการ</button><div class="del-opt-hint">นี่คือสิ่งที่ต้องการในกรณีทั่วไป — วัสดุหายจากหน้าจอทันที</div><button class="del-opt hard" onclick="doDeleteMaterial('${escapeAttr(matId).replace(/'/g,'&#39;')}')">⚠️ ลบถาวรทิ้งทั้งหมด</button><div class="del-opt-hint">ใช้เฉพาะวัสดุที่สร้างผิด/ยังไม่เคยมีการเบิก-รับ — ถ้าเคยใช้แล้วระบบจะให้ "ลบออกจากรายการ" แทน</div><div class="modal-btns" style="margin-top:18px"><button class="modal-btn modal-btn-cancel" onclick="Modal.close()">ยกเลิก</button></div>`);
  }
  async function doDeactivateMaterial(matId){
    const m=matState.materials.find(x=>x.id===matId); Modal.toast('กำลังปิดใช้งาน...');
    try{ const res=await API.deactivateMaterial(matId); if(!res.ok) throw new Error(res.error||'ไม่สำเร็จ'); Modal.close(); Modal.toast('✓ ปิดใช้งาน "'+(m?m.name:matId)+'" แล้ว'); setTimeout(loadAll,1200); }
    catch(err){ Modal.toast('❌ '+err.message); }
  }
  async function doDeleteMaterial(matId){
    const m=matState.materials.find(x=>x.id===matId);
    const ok=await Modal.confirm({icon:'⚠️',iconClass:'danger',title:'ลบถาวร?',desc:'ยืนยันลบ "'+(m?m.name:matId)+'" ถาวร? กู้คืนไม่ได้',confirmText:'ลบถาวร',cancelText:'ยกเลิก',confirmClass:'modal-btn-danger'});
    if(!ok) return;
    Modal.toast('กำลังลบ...');
    try{ const res=await API.deleteMaterial(matId); if(res&&res.ok){ Modal.close(); Modal.toast('✓ ลบ "'+(m?m.name:matId)+'" ถาวรแล้ว'); setTimeout(loadAll,1200); } else Modal.toast('⚠️ '+((res&&res.error)||'ลบถาวรไม่ได้ — วัสดุนี้มีประวัติการเคลื่อนไหว ใช้ "ปิดใช้งาน" แทน'),4000); }
    catch(err){ Modal.toast('❌ '+err.message); }
  }

  loadAll();
  </script>
</body>
</html>
