<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>วิธีใช้งาน — DSTR PM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/design-system.css">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#0f172a">
<style>
  .hp-prog { display:flex; align-items:center; gap:8px; font-size:var(--text-sm); color:var(--color-blue-700); background:var(--color-blue-50); border-radius:var(--radius-lg); padding:10px 14px; margin-bottom:var(--space-5); }
  .hp-prog b { font-size:var(--text-base); }
  .hp-cat { font-size:var(--text-sm); font-weight:700; color:var(--color-slate-700); margin:var(--space-5) 2px var(--space-2); display:flex; align-items:center; gap:6px; }
  .hp-cat:first-child { margin-top:0; }
  .hp-card { display:flex; align-items:center; gap:12px; background:#fff; border:1px solid var(--color-slate-200); border-radius:var(--radius-lg); padding:11px 13px; margin-bottom:9px; }
  .hp-card.on { cursor:pointer; } .hp-card.on:hover { border-color:var(--color-blue-400); background:var(--color-slate-50); }
  .hp-card.soon { opacity:0.6; }
  .hp-thumb { flex:0 0 46px; height:46px; border-radius:var(--radius-md); background:var(--color-blue-50); display:flex; align-items:center; justify-content:center; font-size:20px; }
  .hp-card.on .hp-thumb { background:var(--color-blue-600); }
  .hp-meta { flex:1; min-width:0; }
  .hp-t { font-size:var(--text-sm); font-weight:600; color:var(--color-slate-800); line-height:1.3; }
  .hp-s { font-size:11px; color:var(--color-slate-500); margin-top:2px; }
  .hp-badge { font-size:10px; font-weight:700; padding:3px 10px; border-radius:var(--radius-full); white-space:nowrap; }
  .hp-b-play { background:var(--color-blue-600); color:#fff; }
  .hp-b-soon { background:var(--color-slate-100); color:var(--color-slate-400); }
  .hp-ov { position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; display:none; align-items:center; justify-content:center; flex-direction:column; box-sizing:border-box; padding:max(54px,env(safe-area-inset-top)) 14px max(16px,env(safe-area-inset-bottom)); }
  .hp-ov.show { display:flex; }
  .hp-ov video { max-width:92vw; max-height:66vh; max-height:66dvh; width:auto; height:auto; border-radius:12px; background:#000; }
  .hp-ov-t { color:#fff; font-size:14px; font-weight:600; margin-bottom:10px; text-align:center; padding:0 44px; }
  .hp-ov-top { position:fixed; top:max(10px,env(safe-area-inset-top)); right:12px; width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.22); color:#fff; border:none; font-size:19px; cursor:pointer; z-index:10000; display:flex; align-items:center; justify-content:center; }
  .hp-ov-x { color:#fff; background:rgba(255,255,255,0.2); border:none; border-radius:var(--radius-full); padding:13px 32px; font-size:15px; font-weight:700; font-family:inherit; margin-top:16px; cursor:pointer; min-height:50px; }
</style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="page-content">
        <h1 style="font-size:var(--text-2xl);margin-bottom:4px"><i data-lucide="play-circle" style="width:24px;height:24px;vertical-align:-4px"></i> วิธีใช้งาน DSTR</h1>
        <div style="color:var(--color-slate-500);font-size:var(--text-sm);margin-bottom:var(--space-3)">คลิปสอนสั้นๆ ทีละขั้น · ดูบนมือถือได้เลย</div>
        <div class="hp-prog">✅ พร้อมดู <b id="hpReady">0</b> คลิป · กำลังทยอยเพิ่มให้ครบทุกฟีเจอร์</div>
        <div id="hpBody"></div>
      </div>
    </main>
  </div>

  <div class="hp-ov" id="hpOv" onclick="ovBackdrop(event)">
    <button class="hp-ov-top" onclick="closeVid()" aria-label="ปิด">✕</button>
    <div class="hp-ov-t" id="hpOvT"></div>
    <video id="hpVid" controls playsinline></video>
    <button class="hp-ov-x" onclick="closeVid()">ปิดวิดีโอ</button>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/state.js"></script>
  <script src="../js/modal.js"></script>
  <script src="../vendor/lucide/lucide.min.js"></script>
  <script src="../js/shell.js"></script>
  <script>
  if (!Auth.requireAuth('admin')) { /* redirected */ }
  Shell.render({ page: 'help', title: 'วิธีใช้งาน', scope: 'global' });

  var TUTORIALS = [
    { cat: '🚀 เริ่มต้นใช้งาน', items: [
      { t: 'ติดตั้งแอพลงมือถือ', ic: '📲', f: '../tutorials/install.mp4', dur: '0:32' },
      { t: 'เข้าสู่ระบบด้วย Google', ic: '🔑', f: '../tutorials/login.mp4', dur: '0:20' },
    ]},
    { cat: '⏰ ลงเวลาหน้างาน', items: [
      { t: 'วิธีเช็คอิน', ic: '📍', f: '../tutorials/checkin.mp4', dur: '0:49' },
      { t: 'ดูและพิมพ์ใบลงเวลา (ส่ง HR)', ic: '🗓️', f: '../tutorials/timesheet.mp4', dur: '0:31' },
      { t: 'ปักหมุดไซต์ (Site Engineer ขึ้นไป)', ic: '📌', f: '../tutorials/pinsite.mp4', dur: '0:31' },
    ]},
    { cat: '📦 จัดการวัสดุ', items: [
      { t: 'รับวัสดุเข้าไซต์', ic: '📥', f: '../tutorials/receive.mp4', dur: '0:23' },
      { t: 'เบิกวัสดุ', ic: '📤', f: '../tutorials/withdraw.mp4', dur: '0:16' },
      { t: 'นับสต๊อก / Quick Log', ic: '⚡', f: '../tutorials/count.mp4', dur: '0:20' },
    ]},
    { cat: '📝 รายงานประจำวัน', items: [
      { t: 'บันทึกรายงาน + แนบรูป', ic: '📷', f: '../tutorials/daily.mp4', dur: '0:22' },
    ]},
    { cat: '👷 ทีมและผู้รับเหมา', items: [
      { t: 'เช็คอินทีมช่าง', ic: '👷', f: '../tutorials/teamcheckin.mp4', dur: '0:20' },
      { t: 'ประเมินผู้รับเหมา', ic: '⭐', f: '../tutorials/eval.mp4', dur: '0:25' },
    ]},
    { cat: '📊 ภาพรวมโครงการ (หัวหน้า)', items: [
      { t: 'อ่าน Dashboard + ความคืบหน้า', ic: '📊', f: '../tutorials/dashboard.mp4', dur: '0:34' },
      { t: 'จัดการงวดเบิก', ic: '💰', f: '../tutorials/payments.mp4', dur: '0:31' },
    ]},
    { cat: '⚙️ สำหรับผู้ดูแล', items: [
      { t: 'สัญญาเจ้าบ้าน / ผู้รับเหมา', ic: '📄', f: '../tutorials/contracts.mp4', dur: '0:24' },
      { t: 'จัดการผู้ใช้และสิทธิ์', ic: '👥', f: '../tutorials/users.mp4', dur: '0:26' },
      { t: 'สร้างโครงการใหม่', ic: '🏗️', f: '../tutorials/newproject.mp4', dur: '0:23' },
    ]},
  ];

  function render(){
    var ready=0, html='';
    TUTORIALS.forEach(function(g){
      html+='<div class="hp-cat">'+g.cat+'</div>';
      g.items.forEach(function(it){
        var on=!!it.f; if(on) ready++;
        var badge=on?'<span class="hp-badge hp-b-play">▶ ดู</span>':'<span class="hp-badge hp-b-soon">เร็วๆ นี้</span>';
        var sub=on?('คลิปมีเสียง · '+(it.dur||'')):'กำลังทำ';
        html+='<div class="hp-card '+(on?'on':'soon')+'"'+(on?' onclick="playVid(\''+it.f+'\',\''+it.t.replace(/\x27/g,"")+'\')"':'')+'><div class="hp-thumb">'+(it.ic||'🎬')+'</div><div class="hp-meta"><div class="hp-t">'+it.t+'</div><div class="hp-s">'+sub+'</div></div>'+badge+'</div>';
      });
    });
    document.getElementById('hpBody').innerHTML=html;
    document.getElementById('hpReady').textContent=ready;
  }
  function playVid(file,title){ document.getElementById('hpOvT').textContent=title; var v=document.getElementById('hpVid'); v.src=file; document.getElementById('hpOv').classList.add('show'); v.play().catch(function(){}); }
  function closeVid(){ var v=document.getElementById('hpVid'); v.pause(); v.removeAttribute('src'); v.load(); document.getElementById('hpOv').classList.remove('show'); }
  function ovBackdrop(e){ if(e.target===document.getElementById('hpOv')) closeVid(); }

  render();
  if(window.lucide) lucide.createIcons();
  </script>
</body>
</html>
