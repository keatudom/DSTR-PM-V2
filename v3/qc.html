<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC ตรวจคุณภาพ — DSTR PM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/design-system.css">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#0f172a">
<style>
  .qc-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-4); flex-wrap:wrap; gap:var(--space-2); }
  .qc-head h1 { font-size:var(--text-2xl); }
  .qc-head-sub { font-size:var(--text-sm); color:var(--color-slate-500); margin-top:2px; }
  .qc-tally { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
  .qc-tally .t { background:#fff; border:1px solid var(--color-slate-200); border-radius:var(--radius-lg); padding:12px 8px; text-align:center; }
  .qc-tally .t .n { font-size:22px; font-weight:700; line-height:1; }
  .qc-tally .t .l { font-size:10px; color:var(--color-slate-500); margin-top:5px; }
  .qc-tally .pass .n { color:var(--color-success-700); } .qc-tally .cond .n { color:var(--color-warning-700); }
  .qc-tally .fail .n { color:var(--color-error-600); } .qc-tally .pend .n { color:var(--color-slate-500); }
  .qc-badge { display:inline-block; font-size:11px; font-weight:600; padding:3px 9px; border-radius:var(--radius-full); }
  .qc-badge.pass { background:var(--color-success-50); color:var(--color-success-700); }
  .qc-badge.conditional { background:var(--color-warning-50); color:var(--color-warning-700); }
  .qc-badge.fail { background:var(--color-error-50); color:var(--color-error-700); }
  .qc-badge.pending { background:var(--color-slate-100); color:var(--color-slate-500); }
  .qc-item { display:flex; justify-content:space-between; align-items:center; padding:13px 4px; border-bottom:1px solid var(--color-slate-100); cursor:pointer; }
  .qc-item:last-child { border-bottom:none; } .qc-item:hover { background:var(--color-slate-50); }
  .qc-item-l .code { font-weight:700; font-size:14px; color:var(--color-slate-900); }
  .qc-item-l .name { font-size:12px; color:var(--color-slate-500); margin-top:2px; }
  .qc-item-r { text-align:right; }
  .qc-item-r .round { font-size:10px; color:var(--color-slate-400); margin-top:4px; }
  .qc-def { font-size:10px; color:var(--color-error-700); margin-top:3px; }
  .qc-sec { font-size:12px; font-weight:700; color:var(--color-blue-700); background:var(--color-blue-50); padding:8px 12px; border-radius:var(--radius-md); margin:16px 0 8px; }
  .qc-crit { border:1px solid var(--color-slate-200); border-radius:var(--radius-md); padding:12px; margin-bottom:10px; }
  .qc-crit .top { display:flex; justify-content:space-between; gap:8px; }
  .qc-crit .item { font-weight:600; font-size:13px; color:var(--color-slate-900); }
  .qc-crit .cls { font-size:10px; font-weight:700; padding:2px 6px; border-radius:5px; height:fit-content; white-space:nowrap; }
  .cls-C { background:var(--color-error-50); color:var(--color-error-700); } .cls-M { background:var(--color-warning-50); color:var(--color-warning-700); } .cls-Mn { background:#e0e7ff; color:#4338ca; }
  .qc-crit .acc { font-size:11px; color:var(--color-slate-500); margin-top:5px; line-height:1.45; }
  .qc-crit .meth { font-size:11px; color:var(--color-slate-400); margin-top:3px; font-style:italic; }
  .qc-res { display:flex; gap:6px; margin-top:10px; }
  .qc-res button { flex:1; padding:9px; border-radius:var(--radius-md); border:2px solid var(--color-slate-200); background:#fff; font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; color:var(--color-slate-500); }
  .qc-res button.on-pass { background:var(--color-success-500); border-color:var(--color-success-500); color:#fff; }
  .qc-res button.on-fail { background:var(--color-error-500); border-color:var(--color-error-500); color:#fff; }
  .qc-res button.on-na { background:var(--color-slate-500); border-color:var(--color-slate-500); color:#fff; }
  .qc-fail-box { margin-top:10px; padding:10px; background:var(--color-error-50); border-radius:var(--radius-md); display:none; }
  .qc-fail-box.show { display:block; }
  .qc-fail-box .row { display:flex; gap:6px; align-items:center; margin-bottom:8px; }
  .qc-fail-box select, .qc-fail-box input, .qc-fail-box textarea { font-family:inherit; font-size:12px; padding:7px 9px; border:1px solid var(--color-slate-300); border-radius:var(--radius-md); width:100%; }
  .qc-fail-box label { font-size:11px; color:var(--color-slate-500); min-width:52px; }
  .qc-thumb { width:44px; height:44px; border-radius:6px; object-fit:cover; border:1px solid var(--color-slate-200); }
  .qc-field { margin-bottom:11px; }
  .qc-field label { display:block; font-size:11px; color:var(--color-slate-500); margin-bottom:4px; font-weight:600; }
  .qc-field input { width:100%; box-sizing:border-box; padding:9px 11px; border:1px solid var(--color-slate-300); border-radius:var(--radius-md); font-family:inherit; font-size:13px; }
  .qc-sticky { position:sticky; bottom:0; background:#fff; border-top:1px solid var(--color-slate-200); padding:12px 0; margin-top:8px; display:flex; gap:8px; }
  .qc-sticky .btn { flex:1; }
  .qc-notice { background:var(--color-warning-50); border:1px solid #fcd34d; color:var(--color-warning-700); border-radius:var(--radius-lg); padding:14px; font-size:13px; line-height:1.55; }
  .qc-empty { text-align:center; color:var(--color-slate-400); padding:30px 10px; font-size:13px; }
  .qc-big-status { text-align:center; padding:22px; border-radius:var(--radius-lg); margin-bottom:14px; }
  .qc-big-status .lbl { font-size:16px; font-weight:700; }
  .qc-big-status.pass { background:var(--color-success-50); color:var(--color-success-700); }
  .qc-big-status.conditional { background:var(--color-warning-50); color:var(--color-warning-700); }
  .qc-big-status.fail { background:var(--color-error-50); color:var(--color-error-700); }
  .qc-big-status.pending { background:var(--color-slate-100); color:var(--color-slate-500); }
  .card-title { display:flex; justify-content:space-between; align-items:center; gap:8px; font-weight:600; color:var(--color-slate-800); margin-bottom:var(--space-3); flex-wrap:wrap; }
</style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">
      <div class="page-content">
        <div class="qc-head">
          <div>
            <h1><i data-lucide="clipboard-check" style="width:24px;height:24px;vertical-align:-4px"></i> QC ตรวจคุณภาพ</h1>
            <div class="qc-head-sub" id="hdrSub">กำลังโหลด...</div>
          </div>
        </div>

        <div id="loadingScreen" class="qc-empty">กำลังโหลด QC...</div>
        <div id="gasNotice" class="qc-notice" style="display:none">⚠️ ฟีเจอร์ตรวจคุณภาพ (QC) ทำงานบนเครื่องยนต์ใหม่ (Cloudflare) เท่านั้น</div>

        <div id="view-list" style="display:none">
          <div class="qc-tally" id="qcTally"></div>
          <div class="card card-body">
            <div class="card-title"><span>รายการตรวจ QC ต่อชิ้นงาน</span><button class="btn btn-primary btn-sm" onclick="openCreate()"><i data-lucide="plus"></i> ตรวจงานใหม่</button></div>
            <div id="qcList"></div>
          </div>
        </div>

        <div id="view-create" style="display:none">
          <div class="card card-body">
            <div class="card-title"><span>เปิดการตรวจ QC ใหม่</span></div>
            <div class="qc-field"><label>รหัสชิ้นงาน (FF Code) *</label><input id="c_ff" placeholder="เช่น F-01"></div>
            <div class="qc-field"><label>รายการเฟอร์นิเจอร์</label><input id="c_item" placeholder="เช่น ตู้โชว์ TV"></div>
            <div class="qc-field"><label>ตำแหน่ง/ห้อง</label><input id="c_loc" placeholder="เช่น Living room"></div>
            <div class="qc-field"><label>ผู้ผลิต/ช่าง</label><input id="c_maker" placeholder="ชื่อทีม/ช่าง"></div>
            <div class="qc-field"><label>อ้างอิงแบบเลขที่</label><input id="c_dwg" placeholder="เลขที่แบบ"></div>
            <div class="qc-field"><label>ผู้ตรวจสอบ</label><input id="c_insp" placeholder="ชื่อผู้ตรวจ"></div>
            <div class="qc-field"><label>วันที่ตรวจ</label><input id="c_date" type="date"></div>
            <div class="qc-sticky"><button class="btn btn-ghost" onclick="showView('list')">ยกเลิก</button><button class="btn btn-primary" onclick="submitCreate()">เริ่มตรวจ →</button></div>
          </div>
        </div>

        <div id="view-form" style="display:none">
          <div class="card card-body">
            <div class="card-title"><span id="formTitle">ฟอร์มตรวจ</span><span id="formRound"></span></div>
            <div id="qcForm"></div>
            <div class="qc-sticky"><button class="btn btn-ghost" onclick="showView('list')">พักไว้</button><button class="btn btn-primary" onclick="closeInspection()">สรุป & ปิดการตรวจ</button></div>
          </div>
        </div>

        <div id="view-summary" style="display:none">
          <div class="card card-body">
            <div id="summaryBody"></div>
            <div class="qc-sticky"><button class="btn btn-ghost" onclick="showView('list')">กลับ</button><button class="btn btn-primary" id="btnRecheck" onclick="recheck()">ตรวจซ้ำรอบใหม่</button></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <input type="file" id="qcPhotoInput" accept="image/*" capture="environment" style="display:none">

  <script src="../js/config.js"></script>
  <script src="../js/state.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/modal.js"></script>
  <script src="../vendor/lucide/lucide.min.js"></script>
  <script src="../js/shell.js"></script>
  <script>
  if (!Auth.requireAuth('admin')) { /* redirect */ }
  Shell.render({ page: 'qc', title: 'QC ตรวจคุณภาพ', scope: 'project' });

  var QC = { criteria:[], current:null, photoTarget:null };
  function showView(name){ ['list','create','form','summary'].forEach(function(v){ var el=document.getElementById('view-'+v); if(el) el.style.display=(v===name)?'block':'none'; }); window.scrollTo(0,0); }

  (async function init(){
    try{ var pj=await API.getProjects(); if(pj&&pj.ok&&Array.isArray(pj.data)){ var p=pj.data.find(function(x){ return x.project_id===state.projectId; }); document.getElementById('hdrSub').textContent=(p&&p.name?p.name:state.projectId)+' · ตรวจก่อนส่งมอบ'; } }catch(e){}
    if(CONFIG.BACKEND!=='cf'){ document.getElementById('loadingScreen').style.display='none'; document.getElementById('gasNotice').style.display='block'; return; }
    try{ var cr=await API.getQcCriteria(); QC.criteria=(cr&&cr.ok&&Array.isArray(cr.data))?cr.data:[]; }catch(e){ QC.criteria=[]; }
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('c_date').value=todayStr();
    await refreshList(); showView('list');
    if(window.lucide) lucide.createIcons();
  })();

  async function refreshList(){
    var tallyEl=document.getElementById('qcTally'), listEl=document.getElementById('qcList');
    var sum, ins;
    try{ sum=await API.qcSummary(); ins=await API.getQcInspections({}); }catch(e){ listEl.innerHTML='<div class="qc-empty">โหลดข้อมูลไม่สำเร็จ</div>'; return; }
    var t=(sum&&sum.ok&&sum.data&&sum.data.tally)?sum.data.tally:{pass:0,conditional:0,fail:0,pending:0};
    tallyEl.innerHTML=tallyCell('pass',t.pass,'ผ่าน')+tallyCell('cond',t.conditional,'มีเงื่อนไข')+tallyCell('fail',t.fail,'ไม่ผ่าน')+tallyCell('pend',t.pending,'รอตรวจ');
    var rows=(ins&&ins.ok&&Array.isArray(ins.data))?ins.data:[];
    if(!rows.length){ listEl.innerHTML='<div class="qc-empty">ยังไม่มีการตรวจ — กด "＋ ตรวจงานใหม่" เพื่อเริ่ม</div>'; return; }
    listEl.innerHTML=rows.map(function(r){
      var dfc=(r.status==='fail'||r.status==='conditional')?'<div class="qc-def">มี defect ค้าง: '+defBrief(r)+'</div>':'';
      return '<div class="qc-item" onclick="openInspection(\''+r.inspection_id+'\')"><div class="qc-item-l"><div class="code">'+esc(r.ff_code||'(ไม่ระบุ FF)')+'</div><div class="name">'+esc(r.item_name||'')+'</div>'+dfc+'</div><div class="qc-item-r"><span class="qc-badge '+r.status+'">'+esc(r.status_label||r.status)+'</span><div class="round">รอบ '+(r.round||1)+' · '+esc(r.inspect_date||'')+'</div></div></div>';
    }).join('');
  }
  function tallyCell(cls,n,label){ return '<div class="t '+cls+'"><div class="n">'+(n||0)+'</div><div class="l">'+label+'</div></div>'; }
  function defBrief(r){ return (r.summary_fail||0)+' รายการ'; }

  function openCreate(){ ['c_ff','c_item','c_loc','c_maker','c_dwg','c_insp'].forEach(function(id){ document.getElementById(id).value=''; }); document.getElementById('c_date').value=todayStr(); showView('create'); }
  async function submitCreate(){
    var ff=document.getElementById('c_ff').value.trim();
    if(!ff){ Modal.toast('⚠️ กรุณากรอกรหัสชิ้นงาน (FF Code)'); return; }
    var data={ ff_code:ff, item_name:document.getElementById('c_item').value.trim(), location:document.getElementById('c_loc').value.trim(), maker:document.getElementById('c_maker').value.trim(), drawing_ref:document.getElementById('c_dwg').value.trim(), inspector:document.getElementById('c_insp').value.trim(), inspect_date:document.getElementById('c_date').value||todayStr() };
    var res=await API.createQcInspection(data);
    if(!res||!res.ok){ Modal.toast('❌ สร้างไม่สำเร็จ: '+((res&&res.error)||'')); return; }
    await openInspection(res.data.inspection_id);
  }

  async function openInspection(inspectionId){
    var res;
    try{ res=await API.getQcInspection(inspectionId); }catch(e){ Modal.toast('❌ โหลดไม่สำเร็จ'); return; }
    if(!res||!res.ok||!res.data){ Modal.toast('❌ ไม่พบการตรวจ'); return; }
    QC.current=res.data; var ins=res.data.inspection;
    if(ins.status&&ins.status!=='pending'){ renderSummary(); showView('summary'); return; }
    document.getElementById('formTitle').textContent=(ins.ff_code||'')+' · '+(ins.item_name||'');
    document.getElementById('formRound').textContent='รอบ '+(ins.round||1);
    renderForm(); showView('form');
  }
  function renderForm(){
    var results=QC.current.results||[], html='', lastSec='';
    results.forEach(function(r){ if(r.section!==lastSec){ html+='<div class="qc-sec">'+esc(r.section)+'. '+esc(r.section_name||'')+'</div>'; lastSec=r.section; } html+=renderCrit(r); });
    document.getElementById('qcForm').innerHTML=html;
  }
  function renderCrit(r){
    var cls=r.criteria_defect_class||'', rid=r.result_id, res=r.result||'', failShow=(res==='fail')?' show':'', dc=r.defect_class||cls;
    return '<div class="qc-crit" id="crit-'+rid+'"><div class="top"><div class="item">'+esc(r.seq)+' '+esc(r.item)+'</div>'+(cls?'<span class="cls cls-'+cls+'">'+cls+'</span>':'')+'</div><div class="acc">✓ '+esc(r.acceptance||'')+'</div>'+(r.method?'<div class="meth">วิธี: '+esc(r.method)+'</div>':'')+'<div class="qc-res">'+resBtn(rid,'pass',res,'ผ่าน')+resBtn(rid,'fail',res,'ไม่ผ่าน')+resBtn(rid,'na',res,'N/A')+'</div><div class="qc-fail-box'+failShow+'" id="fb-'+rid+'"><div class="row"><label>ระดับ</label><select id="dc-'+rid+'" onchange="saveResult(\''+rid+'\')">'+dcOpt('C',dc)+dcOpt('M',dc)+dcOpt('Mn',dc)+'</select></div><div class="row"><label>หมายเหตุ</label><input id="nt-'+rid+'" value="'+esc(r.note||'')+'" placeholder="อธิบาย defect + แนวทางแก้" onblur="saveResult(\''+rid+'\')"></div><div class="row"><label>รูป</label>'+(r.photo_url?'<img src="'+esc(r.photo_url)+'" class="qc-thumb">':'')+'<button class="btn btn-ghost btn-sm" onclick="attachPhoto(\''+rid+'\')">📷 ถ่ายรูป defect</button></div></div></div>';
  }
  function resBtn(rid,val,cur,label){ var on=(cur===val)?' class="on-'+val+'"':''; return '<button'+on+' onclick="tick(\''+rid+'\',\''+val+'\')">'+label+'</button>'; }
  function dcOpt(v,cur){ return '<option value="'+v+'"'+(v===cur?' selected':'')+'>'+v+(v==='C'?' — วิกฤต':v==='M'?' — สำคัญ':' — เล็กน้อย')+'</option>'; }

  async function tick(resultId,val){
    var box=document.getElementById('fb-'+resultId), crit=document.getElementById('crit-'+resultId);
    crit.querySelectorAll('.qc-res button').forEach(function(b){ b.className=''; });
    crit.querySelectorAll('.qc-res button')[{pass:0,fail:1,na:2}[val]].className='on-'+val;
    if(box) box.className='qc-fail-box'+(val==='fail'?' show':'');
    var r=(QC.current.results||[]).find(function(x){ return x.result_id===resultId; });
    if(r) r.result=val;
    await saveResult(resultId);
  }
  async function saveResult(resultId){
    var r=(QC.current.results||[]).find(function(x){ return x.result_id===resultId; }); if(!r) return;
    var data={ result_id:resultId, result:r.result||'' };
    if(r.result==='fail'){ var dcEl=document.getElementById('dc-'+resultId), ntEl=document.getElementById('nt-'+resultId); if(dcEl) data.defect_class=dcEl.value; if(ntEl) data.note=ntEl.value; if(r.photo_url) data.photo_url=r.photo_url; }
    try{ var res=await API.updateQcResult(data); if(res&&res.ok&&res.data&&res.data.result) Object.assign(r,res.data.result); }catch(e){}
  }
  function attachPhoto(resultId){ QC.photoTarget=resultId; document.getElementById('qcPhotoInput').click(); }
  document.getElementById('qcPhotoInput').addEventListener('change', async function(ev){
    var file=ev.target.files[0]; if(!file||!QC.photoTarget) return;
    var rid=QC.photoTarget; var reader=new FileReader();
    reader.onload=async function(){
      var res=await API.uploadLogPhoto(reader.result);
      if(res&&res.ok&&res.photo_url){ var r=(QC.current.results||[]).find(function(x){ return x.result_id===rid; }); if(r) r.photo_url=res.photo_url; await API.updateQcResult({ result_id:rid, photo_url:res.photo_url }); renderForm(); }
      else Modal.toast('❌ อัปรูปไม่สำเร็จ');
    };
    reader.readAsDataURL(file); ev.target.value='';
  });

  async function closeInspection(){
    var id=QC.current.inspection.inspection_id;
    var res=await API.closeQcInspection(id);
    if(!res||!res.ok){ Modal.toast('❌ ปิดไม่สำเร็จ: '+((res&&res.error)||'')); return; }
    var full=await API.getQcInspection(id); if(full&&full.ok) QC.current=full.data;
    renderSummary(); showView('summary');
  }
  function renderSummary(){
    var ins=QC.current.inspection, results=QC.current.results||[], fails=results.filter(function(r){ return r.result==='fail'; });
    var html='<div class="qc-big-status '+ins.status+'"><div class="lbl">'+esc(ins.status_label||ins.status)+'</div></div><div style="text-align:center;font-size:13px;color:var(--color-slate-700);margin-bottom:14px">'+esc(ins.ff_code||'')+' · '+esc(ins.item_name||'')+' · รอบ '+(ins.round||1)+'</div><div class="qc-tally">'+tallyCell('pass',ins.summary_pass,'ผ่าน')+tallyCell('fail',ins.summary_fail,'ไม่ผ่าน')+tallyCell('pend',ins.summary_na,'N/A')+tallyCell('cond',results.length,'รวมข้อ')+'</div>';
    if(fails.length){ html+='<div class="card-title" style="margin-top:14px"><span>รายการที่ไม่ผ่าน</span></div>'+fails.map(function(r){ var rr=(r.recheck_result==='pass')?'<span class="qc-badge pass">แก้แล้ว ✓</span>':''; return '<div class="qc-item" style="cursor:default"><div class="qc-item-l"><div class="code">'+esc(r.seq)+' '+esc(r.item)+' <span class="cls cls-'+(r.defect_class||'M')+'">'+(r.defect_class||'M')+'</span></div><div class="name">'+esc(r.note||'')+'</div></div><div class="qc-item-r">'+rr+'</div></div>'; }).join(''); }
    document.getElementById('summaryBody').innerHTML=html;
  }
  async function recheck(){
    var ins=QC.current.inspection;
    var res=await API.createQcInspection({ ff_code:ins.ff_code, item_name:ins.item_name, location:ins.location, maker:ins.maker, drawing_ref:ins.drawing_ref, inspector:ins.inspector, inspect_date:todayStr() });
    if(!res||!res.ok){ Modal.toast('❌ สร้างรอบใหม่ไม่สำเร็จ'); return; }
    await openInspection(res.data.inspection_id);
  }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  </script>
</body>
</html>
