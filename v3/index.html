<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ — DSTR PM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/design-system.css">
<link rel="manifest" href="../manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DSTR">
<link rel="apple-touch-icon" href="../icons/icon-180.png">
<style>
  body { display: flex; min-height: 100vh; }
  .login-container { display: flex; width: 100%; min-height: 100vh; }

  /* ซ้าย: hero */
  .login-left {
    flex: 1;
    background: linear-gradient(135deg, var(--color-slate-900) 0%, var(--color-blue-700) 100%);
    display: flex; flex-direction: column; justify-content: space-between;
    padding: var(--space-8); color: white; position: relative; overflow: hidden;
  }
  .login-left::before { content:''; position:absolute; top:-10%; right:-10%; width:500px; height:500px; border-radius:50%; background:linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0)); }
  .login-left::after  { content:''; position:absolute; bottom:-10%; left:-10%; width:400px; height:400px; border-radius:50%; background:linear-gradient(135deg, rgba(59,130,246,0.2), rgba(37,99,235,0)); }
  .brand { display:flex; align-items:center; gap:var(--space-3); font-size:var(--text-2xl); font-weight:700; z-index:1; }
  .brand-icon { width:44px; height:44px; background:white; color:var(--color-blue-600); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; }
  .brand-icon i { width:26px; height:26px; }
  .hero-text { max-width:440px; z-index:1; }
  .hero-text h1 { font-size:2.4rem; color:white; line-height:1.3; margin-bottom:var(--space-4); }
  .hero-text p { font-size:var(--text-lg); color:rgba(255,255,255,0.8); }
  .hero-foot { z-index:1; font-size:var(--text-sm); color:rgba(255,255,255,0.6); }

  /* ขวา: ฟอร์ม */
  .login-right { width:480px; background:#fff; display:flex; flex-direction:column; justify-content:center; padding:var(--space-8); box-shadow:-10px 0 30px rgba(0,0,0,0.05); }
  .login-box { width:100%; max-width:360px; margin:0 auto; }
  .login-head { margin-bottom:var(--space-6); }
  .login-head h2 { font-size:var(--text-2xl); margin-bottom:var(--space-2); }
  .login-head p { color:var(--color-slate-500); }

  /* กล่องปุ่ม Google (GIS เรนเดอร์ปุ่มจริงลงตรงนี้) */
  #googleBtn { display:flex; justify-content:center; min-height:44px; margin-bottom:var(--space-2); }
  #googleHint { font-size:var(--text-xs); color:var(--color-slate-400); text-align:center; margin-bottom:var(--space-4); }

  .login-error { display:none; font-size:var(--text-sm); color:var(--color-error-700); background:var(--color-error-50); border:1px solid #fecaca; border-radius:var(--radius-md); padding:var(--space-3); margin-bottom:var(--space-4); }
  .login-error.show { display:block; }
  #gAuthMsg { display:none; font-size:var(--text-sm); color:var(--color-warning-700); background:var(--color-warning-50); border:1px solid #fde68a; border-radius:var(--radius-md); padding:var(--space-3); margin-bottom:var(--space-4); line-height:1.6; }

  .divider { display:flex; align-items:center; text-align:center; color:var(--color-slate-400); font-size:var(--text-sm); margin:var(--space-4) 0; }
  .divider::before, .divider::after { content:''; flex:1; border-bottom:1px solid var(--color-slate-200); }
  .divider:not(:empty)::before { margin-right:var(--space-4); }
  .divider:not(:empty)::after  { margin-left:var(--space-4); }

  .pw-toggle { border:1px solid var(--color-slate-200); border-radius:var(--radius-md); overflow:hidden; }
  .pw-toggle > summary { list-style:none; padding:var(--space-3); font-size:var(--text-sm); color:var(--color-slate-600); cursor:pointer; user-select:none; display:flex; align-items:center; gap:var(--space-2); }
  .pw-toggle > summary::-webkit-details-marker { display:none; }
  .pw-body { padding:0 var(--space-3) var(--space-3); }
  .remember-row { display:flex; align-items:center; gap:var(--space-2); font-size:var(--text-sm); color:var(--color-slate-600); margin:var(--space-3) 0; cursor:pointer; }
  .remember-row input { width:16px; height:16px; accent-color:var(--color-blue-600); }
  .about-link { text-align:center; margin-top:var(--space-6); }

  @media (max-width:900px) {
    .login-left { display:none; }
    .login-right { width:100%; box-shadow:none; }
  }
</style>
</head>
<body>
  <div class="login-container">
    <!-- ซ้าย: แบรนด์ -->
    <div class="login-left">
      <div class="brand">
        <div class="brand-icon"><i data-lucide="building-2"></i></div>
        DSTR Project Management
      </div>
      <div class="hero-text">
        <h1>บริหารงานบิ้วอินอย่างมืออาชีพ</h1>
        <p>ระบบติดตามโครงการงานบิ้วอิน สำหรับบริษัท ดีไซน์ ทีเรีย จำกัด</p>
      </div>
      <div class="hero-foot">&copy; 2026 Designterior — สงวนลิขสิทธิ์</div>
    </div>

    <!-- ขวา: ฟอร์มเข้าสู่ระบบ -->
    <div class="login-right">
      <div class="login-box">
        <div class="login-head">
          <h2>ยินดีต้อนรับ</h2>
          <p>เข้าสู่ระบบด้วยบัญชี Google ของคุณ</p>
        </div>

        <div class="login-error" id="loginError"></div>
        <div id="gAuthMsg"></div>

        <!-- Google Sign-In (GIS เรนเดอร์ปุ่มจริงลงกล่องนี้) -->
        <div id="googleBtn"></div>
        <div id="googleHint">กำลังโหลดปุ่ม Google…</div>

        <!-- รหัสผ่านสำรอง (legacy) -->
        <details class="pw-toggle">
          <summary><i data-lucide="lock"></i> หรือเข้าด้วยรหัสผ่าน (สำรอง)</summary>
          <div class="pw-body">
            <input type="password" class="form-input" id="passwordInput" placeholder="รหัสผ่าน" autocapitalize="none" autocorrect="off" autocomplete="current-password" spellcheck="false" onkeyup="if(event.key==='Enter')doLogin()">
            <label class="remember-row">
              <input type="checkbox" id="rememberMe" checked>
              <span>จำการเข้าสู่ระบบ 7 วัน</span>
            </label>
            <button class="btn btn-primary btn-block" id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ</button>
          </div>
        </details>

        <div class="about-link">
          <a href="../about.html" class="btn btn-secondary btn-sm">เกี่ยวกับเรา · DESIGNTERIOR</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../vendor/lucide/lucide.min.js"></script>
  <script>
  if (window.lucide) lucide.createIcons();

  // ถ้า login อยู่แล้ว → HR ไปใบลงเวลา, ที่เหลือไป projects.html
  if (Auth.isLoggedIn()) {
    window.location.href = (Auth.getRole() === 'hr') ? '../hr.html' : 'projects.html';
  }

  // ── Phase G: Sign in with Google (GIS) — ตรรกะเดิมเป๊ะ ──
  async function handleGoogleCredential(resp) {
    const errorBox = document.getElementById('loginError');
    const gMsg = document.getElementById('gAuthMsg');
    errorBox.classList.remove('show');
    gMsg.style.display = 'none';
    document.getElementById('googleHint').textContent = 'กำลังตรวจสอบ…';

    try {
      const result = await Auth.loginGoogle(resp.credential);
      if (result.ok) {
        window.location.href = (result.role === 'hr') ? '../hr.html' : 'projects.html';
        return;
      }
      if (result.notAuthorized) {
        gMsg.innerHTML = '🔒 อีเมล <b>' + (result.email || '') + '</b> ยังไม่ได้รับอนุญาต<br>' +
          'แจ้งเจ้าของงาน/แอดมินให้เพิ่มสิทธิ์ก่อน แล้วลองใหม่';
        gMsg.style.display = 'block';
      } else {
        errorBox.textContent = '❌ ' + result.error;
        errorBox.classList.add('show');
      }
    } catch (e) {
      errorBox.textContent = '❌ เข้าสู่ระบบไม่สำเร็จ ลองใหม่อีกครั้ง';
      errorBox.classList.add('show');
    }
    document.getElementById('googleHint').textContent = '';
  }

  window.onGoogleLibraryLoad = function() {
    try {
      google.accounts.id.initialize({
        client_id: CONFIG.GOOGLE_CLIENT_ID,
        callback: handleGoogleCredential
      });
      google.accounts.id.renderButton(
        document.getElementById('googleBtn'),
        { theme: 'filled_blue', size: 'large', text: 'signin_with', shape: 'pill', width: 280 }
      );
      document.getElementById('googleHint').textContent = '';
    } catch (e) {
      document.getElementById('googleHint').textContent = 'โหลดปุ่ม Google ไม่สำเร็จ — ใช้รหัสผ่านสำรองได้';
    }
  };

  async function doLogin() {
    const password = document.getElementById('passwordInput').value.trim();
    const errorBox = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');
    errorBox.classList.remove('show');

    if (!password) {
      errorBox.textContent = 'กรุณากรอกรหัสผ่าน';
      errorBox.classList.add('show');
      return;
    }
    btn.disabled = true;
    btn.textContent = 'กำลังตรวจสอบ...';

    try {
      const result = await Auth.login(password);
      if (result.ok) {
        window.location.href = 'projects.html';
      } else {
        errorBox.textContent = '❌ ' + result.error;
        errorBox.classList.add('show');
        document.getElementById('passwordInput').value = '';
        btn.disabled = false;
        btn.textContent = 'เข้าสู่ระบบ';
      }
    } catch (err) {
      errorBox.textContent = '❌ เกิดข้อผิดพลาด ลองใหม่อีกครั้ง';
      errorBox.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'เข้าสู่ระบบ';
    }
  }

  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('../sw.js').catch(function(){}); }
  </script>
  <script src="../js/pwa-install.js"></script>
</body>
</html>
