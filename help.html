<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>วิธีใช้งาน · DSTR</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F3864">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DSTR">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<style>
.app { padding-bottom: 80px; max-width: 480px; margin: 0 auto; }
.hp-hdr { background:#1F3864; color:#fff; padding:16px 16px 18px; border-radius:0 0 18px 18px; }
.hp-hdr-h { font-size:18px; font-weight:700; display:flex; align-items:center; gap:7px; }
.hp-hdr-sub { font-size:12.5px; opacity:.85; margin-top:3px; }
.hp-prog { margin-top:11px; background:rgba(255,255,255,.12); border-radius:11px; padding:8px 12px; font-size:12px; display:flex; align-items:center; gap:8px; }
.hp-prog b { font-size:13.5px; }
.hp-body { padding:14px; }
.hp-cat { font-size:13.5px; font-weight:700; color:#1F3864; margin:18px 2px 9px; }
.hp-cat:first-child { margin-top:4px; }
.hp-card { display:flex; align-items:center; gap:12px; background:#fff; border:1px solid #E5E7EB; border-radius:13px; padding:11px 13px; margin-bottom:9px; }
.hp-card.on { cursor:pointer; }
.hp-card.on:active { background:#F8FAFF; }
.hp-card.soon { opacity:.62; }
.hp-thumb { flex:0 0 46px; height:46px; border-radius:10px; background:#EEF2FF; display:flex; align-items:center; justify-content:center; font-size:20px; }
.hp-card.on .hp-thumb { background:#1F3864; color:#fff; }
.hp-meta { flex:1; min-width:0; }
.hp-t { font-size:13.5px; font-weight:600; color:#1F2937; line-height:1.3; }
.hp-s { font-size:11px; color:#6B7280; margin-top:2px; }
.hp-badge { font-size:10px; font-weight:700; padding:2px 9px; border-radius:99px; white-space:nowrap; }
.hp-b-play { background:#1F3864; color:#fff; }
.hp-b-soon { background:#F3F4F6; color:#9CA3AF; }

.hp-ov { position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:80; display:none; align-items:center; justify-content:center; flex-direction:column; padding:16px; }
.hp-ov.show { display:flex; }
.hp-ov video { width:100%; max-width:430px; border-radius:12px; background:#000; }
.hp-ov-t { color:#fff; font-size:14px; font-weight:600; margin-bottom:10px; text-align:center; }
.hp-ov-x { color:#fff; background:rgba(255,255,255,.18); border:none; border-radius:99px; padding:10px 22px; font-size:14px; font-weight:600; font-family:inherit; margin-top:14px; cursor:pointer; }

.bnav { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #E5E7EB; padding:6px 4px 8px; display:flex; justify-content:space-around; z-index:48; max-width:480px; margin:0 auto; }
.bnav-i { display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 12px; color:#9CA3AF; cursor:pointer; min-width:54px; text-decoration:none; }
.bnav-i.on { color:#1F3864; }
.bnav-ic { font-size:18px; } .bnav-lb { font-size:9px; font-weight:500; }
</style>
</head>
<body>
<div class="app">
  <div class="hp-hdr">
    <div class="hp-hdr-h">📺 วิธีใช้งาน DSTR</div>
    <div class="hp-hdr-sub">คลิปสอนสั้นๆ ทีละขั้น · ดูบนมือถือได้เลย</div>
    <div class="hp-prog">✅ พร้อมดู <b id="hpReady">0</b> คลิป · กำลังทยอยเพิ่มให้ครบทุกฟีเจอร์</div>
  </div>
  <div class="hp-body" id="hpBody"></div>

  <div class="bnav">
    <a class="bnav-i" href="dashboard.html?project=bow-house"><div class="bnav-ic">🏠</div><div class="bnav-lb">Home</div></a>
    <a class="bnav-i" href="materials.html?project=bow-house"><div class="bnav-ic">📦</div><div class="bnav-lb">Materials</div></a>
    <a class="bnav-i" href="checkin.html?project=bow-house"><div class="bnav-ic">⏰</div><div class="bnav-lb">ลงเวลา</div></a>
    <a class="bnav-i" href="daily.html?project=bow-house"><div class="bnav-ic">📝</div><div class="bnav-lb">Daily</div></a>
    <a class="bnav-i on" href="#"><div class="bnav-ic">📺</div><div class="bnav-lb">วิธีใช้</div></a>
  </div>
</div>

<div class="hp-ov" id="hpOv">
  <div class="hp-ov-t" id="hpOvT"></div>
  <video id="hpVid" controls playsinline></video>
  <button class="hp-ov-x" onclick="closeVid()">ปิด</button>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
if (!Auth.requireAuth('admin')) { /* redirected */ }

// 📚 รายการคลิปสอน — เพิ่มคลิปใหม่: ใส่ไฟล์ใน tutorials/ แล้วเติม f + dur ตรงนี้
var TUTORIALS = [
  { cat: '🚀 เริ่มต้นใช้งาน', items: [
    { t: 'ติดตั้งแอพลงมือถือ', ic: '📲', f: 'tutorials/install.mp4', dur: '0:32' },
    { t: 'เข้าสู่ระบบด้วย Google', ic: '🔑', f: 'tutorials/login.mp4', dur: '0:20' },
  ]},
  { cat: '⏰ ลงเวลาหน้างาน', items: [
    { t: 'วิธีเช็คอิน', ic: '📍', f: 'tutorials/checkin.mp4', dur: '0:49' },
    { t: 'ดูและพิมพ์ใบลงเวลา (ส่ง HR)', ic: '🗓️', f: 'tutorials/timesheet.mp4', dur: '0:31' },
    { t: 'ปักหมุดไซต์ (Site Engineer ขึ้นไป)', ic: '📌', f: 'tutorials/pinsite.mp4', dur: '0:31' },
  ]},
  { cat: '📦 จัดการวัสดุ', items: [
    { t: 'รับวัสดุเข้าไซต์', ic: '📥', f: 'tutorials/receive.mp4', dur: '0:23' },
    { t: 'เบิกวัสดุ', ic: '📤', f: 'tutorials/withdraw.mp4', dur: '0:16' },
    { t: 'นับสต๊อก / Quick Log', ic: '⚡', f: 'tutorials/count.mp4', dur: '0:20' },
  ]},
  { cat: '📝 รายงานประจำวัน', items: [
    { t: 'บันทึกรายงาน + แนบรูป', ic: '📷', f: 'tutorials/daily.mp4', dur: '0:22' },
  ]},
  { cat: '👷 ทีมและผู้รับเหมา', items: [
    { t: 'เช็คอินทีมช่าง', ic: '👷', f: 'tutorials/teamcheckin.mp4', dur: '0:20' },
    { t: 'ประเมินผู้รับเหมา', ic: '⭐', f: 'tutorials/eval.mp4', dur: '0:25' },
  ]},
  { cat: '📊 ภาพรวมโครงการ (หัวหน้า)', items: [
    { t: 'อ่าน Dashboard + ความคืบหน้า', ic: '📊', f: 'tutorials/dashboard.mp4', dur: '0:34' },
    { t: 'จัดการงวดเบิก', ic: '💰', f: 'tutorials/payments.mp4', dur: '0:31' },
  ]},
  { cat: '⚙️ สำหรับผู้ดูแล', items: [
    { t: 'สัญญาเจ้าบ้าน / ผู้รับเหมา', ic: '📄', f: 'tutorials/contracts.mp4', dur: '0:24' },
    { t: 'จัดการผู้ใช้และสิทธิ์', ic: '👥', f: 'tutorials/users.mp4', dur: '0:26' },
    { t: 'สร้างโครงการใหม่', ic: '🏗️', f: 'tutorials/newproject.mp4', dur: '0:23' },
  ]},
];

function render() {
  var ready = 0, html = '';
  TUTORIALS.forEach(function (g) {
    html += '<div class="hp-cat">' + g.cat + '</div>';
    g.items.forEach(function (it) {
      var on = !!it.f;
      if (on) ready++;
      var badge = on ? '<span class="hp-badge hp-b-play">▶ ดู</span>'
                     : '<span class="hp-badge hp-b-soon">เร็วๆ นี้</span>';
      var sub = on ? ('คลิปมีเสียง · ' + (it.dur || '')) : 'กำลังทำ';
      html += '<div class="hp-card ' + (on ? 'on' : 'soon') + '"' +
        (on ? ' onclick="playVid(\'' + it.f + '\',\'' + it.t.replace(/'/g, "") + '\')"' : '') + '>' +
        '<div class="hp-thumb">' + (it.ic || '🎬') + '</div>' +
        '<div class="hp-meta"><div class="hp-t">' + it.t + '</div><div class="hp-s">' + sub + '</div></div>' +
        badge + '</div>';
    });
  });
  document.getElementById('hpBody').innerHTML = html;
  document.getElementById('hpReady').textContent = ready;
}

function playVid(file, title) {
  document.getElementById('hpOvT').textContent = title;
  var v = document.getElementById('hpVid');
  v.src = file;
  document.getElementById('hpOv').classList.add('show');
  v.play().catch(function(){});
}
function closeVid() {
  var v = document.getElementById('hpVid');
  v.pause(); v.removeAttribute('src'); v.load();
  document.getElementById('hpOv').classList.remove('show');
}

render();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
</script>
<script src="js/pwa-install.js"></script>
</body>
</html>
