<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Daily · Bow House</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<style>
.dr-app { padding-bottom: 80px; /* room for bottom nav + pill */ }

/* Header */
.dr-hdr { background: linear-gradient(135deg,#1F3864 0%,#0C447C 100%); color:#fff; padding:14px 16px; border-radius:0 0 16px 16px; margin:-16px -16px 12px; }
.dr-hdr-r { display:flex; justify-content:space-between; align-items:center; }
.dr-hdr-h { font-size:17px; font-weight:600; margin:0; color:#fff; }
.dr-hdr-d { font-size:11px; opacity:0.85; margin-top:2px; }
.dr-hdr-sub { font-size:10px; opacity:0.7; margin-top:1px; }
.dr-hdr-back { background:rgba(255,255,255,0.15); color:#fff; border:none; padding:6px 12px; border-radius:99px; font-size:11px; font-weight:500; font-family:inherit; cursor:pointer; }

/* Date bar */
.dr-date-bar { background:#fff; border-radius:10px; padding:9px 12px; margin-bottom:10px; display:flex; gap:8px; align-items:center; border:1px solid #E5E7EB; }
.dr-date-bar input { flex:1; padding:6px 10px; border:1px solid #E5E7EB; border-radius:8px; font-size:12px; font-family:inherit; }
.dr-date-nav { width:32px; height:32px; background:#F9FAFB; border:1px solid #E5E7EB; border-radius:8px; cursor:pointer; font-size:14px; }
.dr-date-nav:hover { background:#1F3864; color:#fff; border-color:#1F3864; }
.dr-date-nav:disabled { opacity:0.4; cursor:not-allowed; }

/* Stats */
.dr-stats { background:linear-gradient(135deg,#EFF6FF,#DBEAFE); border-radius:12px; padding:10px 14px; margin-bottom:12px; }
.dr-stats-h { font-size:11px; font-weight:600; color:#1E40AF; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
.dr-stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.dr-stat-c { text-align:center; }
.dr-stat-v { font-size:18px; font-weight:700; color:#1F3864; line-height:1; }
.dr-stat-l { font-size:9px; color:#4B5563; margin-top:2px; }

/* =========================
   COMPOSER — new design
   ========================= */
.dr-comp { background:#fff; border-radius:14px; overflow:hidden; border:1px solid #E5E7EB; box-shadow:0 2px 8px rgba(31,56,100,0.04); margin-bottom:12px; }

/* AI strip */
.dr-comp-strip { background:linear-gradient(90deg,#EDE9FE,#DDD6FE,#EDE9FE); padding:7px 13px; font-size:10px; color:#5B21B6; font-weight:600; display:flex; align-items:center; gap:6px; border-bottom:1px solid #DDD6FE; }
.dr-comp-pulse { width:6px; height:6px; background:#7C3AED; border-radius:50%; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:0.5}50%{opacity:1} }

/* Body */
.dr-comp-body { padding:13px 14px; }
.dr-comp-ta { width:100%; min-height:56px; max-height:140px; border:none; padding:0; font-size:13.5px; font-family:inherit; resize:none; color:#1F2937; line-height:1.55; background:transparent; }
.dr-comp-ta:focus { outline:none; }
.dr-comp-ta::placeholder { color:#9CA3AF; }

/* Tags row */
.dr-comp-tags { padding:0 14px 8px; display:flex; gap:4px; align-items:center; flex-wrap:wrap; }
.dr-comp-tag-lb { font-size:9px; color:#B5B5BD; font-weight:500; margin-right:2px; }
.dr-comp-tag { font-size:9.5px; padding:2px 7px; background:transparent; border:1px solid #E5E7EB; border-radius:99px; color:#6B7280; cursor:pointer; font-family:inherit; transition:all .12s; }
.dr-comp-tag:hover { background:#F3F4F6; color:#1F3864; border-color:#1F3864; }
.dr-comp-extra { display:none; gap:4px; }
.dr-comp-extra.on { display:inline-flex; }

/* Footer */
.dr-comp-foot { padding:9px 12px 11px; background:#FAFAFB; border-top:1px solid #F3F4F6; display:flex; align-items:center; gap:6px; }
.dr-comp-tool { width:34px; height:34px; border-radius:50%; background:#fff; border:1px solid #E5E7EB; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:14px; transition:all .12s; }
.dr-comp-tool:hover { background:#1F3864; color:#fff; border-color:#1F3864; }
.dr-comp-tool.mic { background:linear-gradient(135deg,#7C3AED,#A855F7); color:#fff; border-color:transparent; box-shadow:0 3px 8px rgba(124,58,237,0.25); }
.dr-comp-tool.mic:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(124,58,237,0.35); }
.dr-comp-tool.mic.recording { animation:rec 0.8s infinite; }
@keyframes rec { 0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,0.4)}50%{box-shadow:0 0 0 8px rgba(124,58,237,0)} }
.dr-comp-send { margin-left:auto; background:#1F3864; color:#fff; border:none; padding:7px 16px; border-radius:99px; font-size:11.5px; font-weight:600; font-family:inherit; cursor:pointer; display:flex; align-items:center; gap:5px; }
.dr-comp-send:hover { background:#0C447C; }
.dr-comp-send:disabled { background:#9CA3AF; cursor:not-allowed; }

/* Timeline */
.dr-tl-h { font-size:11px; font-weight:600; color:#4B5563; margin:14px 4px 6px; display:flex; justify-content:space-between; text-transform:uppercase; letter-spacing:0.04em; }
.dr-tl-filters { display:flex; gap:5px; margin-bottom:8px; flex-wrap:wrap; }
.dr-tl-f { padding:4px 10px; background:#fff; border:1px solid #E5E7EB; border-radius:99px; font-size:10px; font-weight:500; cursor:pointer; color:#4B5563; font-family:inherit; }
.dr-tl-f.on { background:#1F3864; color:#fff; border-color:#1F3864; }

.dr-period { font-size:10px; color:#9CA3AF; font-weight:600; padding:6px 4px; text-transform:uppercase; letter-spacing:0.05em; display:flex; align-items:center; gap:6px; margin-top:6px; }
.dr-period::after { content:''; flex:1; height:1px; background:#E5E7EB; }

.dr-log { background:#fff; border-radius:10px; padding:10px 12px; margin-bottom:5px; display:flex; gap:10px; border:1px solid #F3F4F6; }
.dr-log.auto { background:#F0FDF4; border-left:2px solid #1D9E75; border-color:#D1FAE5; }
.dr-log-time { font-size:10.5px; color:#1F3864; font-weight:600; min-width:38px; padding-top:1px; }
.dr-log.auto .dr-log-time { color:#065F46; }
.dr-log-bd { flex:1; min-width:0; }
.dr-log-txt { font-size:12px; color:#1F2937; line-height:1.5; word-wrap:break-word; }
.dr-log-tags { display:flex; gap:4px; margin-top:4px; flex-wrap:wrap; }
.dr-log-tag { font-size:9px; padding:1.5px 7px; border-radius:99px; font-weight:500; }
.dr-tag-ff { background:#E6F1FB; color:#0C447C; }
.dr-tag-ctr { background:#FEF3C7; color:#92400E; }
.dr-tag-issue { background:#FEE2E2; color:#991B1B; }
.dr-tag-auto { background:#D1FAE5; color:#065F46; }
.dr-tag-phase { background:#E5E7EB; color:#4B5563; }
.dr-log-x { color:#D1D5DB; font-size:13px; padding:0 4px; cursor:pointer; }
.dr-log-x:hover { color:#E24B4A; }

.dr-empty { text-align:center; padding:30px 16px; color:#9CA3AF; font-size:11px; }
.dr-empty-i { font-size:32px; margin-bottom:8px; opacity:0.4; }

/* =========================
   STICKY SUMMARY PILL (FAB-style)
   ========================= */
.dr-sticky-wrap { position:fixed; bottom:80px; right:16px; z-index:47; display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
@media(min-width:768px) {
  .dr-sticky-wrap { right:50%; transform:translateX(232px); }
}

/* Pill button — compact, rounded */
.dr-pill { background:linear-gradient(135deg,#7C3AED,#A855F7); border-radius:99px; padding:10px 14px 10px 12px; color:#fff; cursor:pointer; display:flex; align-items:center; gap:7px; box-shadow:0 6px 18px rgba(124,58,237,0.45); transition:all .15s; }
.dr-pill:hover { transform:translateY(-2px); box-shadow:0 8px 22px rgba(124,58,237,0.55); }
.dr-pill.expanded { background:#fff; color:#5B21B6; border:1px solid #DDD6FE; }
.dr-pill-i { font-size:18px; flex-shrink:0; line-height:1; }
.dr-pill-t { font-size:11.5px; font-weight:600; white-space:nowrap; }
.dr-pill-c { font-size:9.5px; background:rgba(255,255,255,0.25); padding:1.5px 7px; border-radius:99px; font-weight:600; min-width:18px; text-align:center; }
.dr-pill.expanded .dr-pill-c { background:#EDE9FE; color:#5B21B6; }

/* Summary expanded panel */
.dr-summ-panel { background:#fff; border:1px solid #DDD6FE; border-radius:14px; padding:14px; box-shadow:0 8px 24px rgba(124,58,237,0.2); display:none; max-width:340px; width:calc(100vw - 28px); }
.dr-summ-panel.on { display:block; animation:slideUp .25s ease-out; }
@keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.dr-summ-tx { font-size:12px; color:#1F2937; line-height:1.7; white-space:pre-wrap; }
.dr-summ-loading { text-align:center; padding:14px; color:#7C3AED; font-size:11px; }
.dr-summ-acts { display:flex; gap:6px; margin-top:10px; padding-top:10px; border-top:1px solid #F3F4F6; }
.dr-summ-act { flex:1; padding:7px; background:#F9FAFB; border:1px solid #E5E7EB; border-radius:8px; font-size:11px; font-weight:500; color:#4B5563; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:4px; }
.dr-summ-act:hover { background:#1F3864; color:#fff; border-color:#1F3864; }

/* AI Confirm modal */
.aic-card { background:#fff; border:1px solid #E5E7EB; border-radius:10px; padding:11px 13px; margin-bottom:8px; }
.aic-section { margin-bottom:8px; }
.aic-h { font-size:10px; font-weight:600; color:#6B7280; text-transform:uppercase; letter-spacing:0.04em; margin-bottom:4px; }
.aic-tags { display:flex; gap:4px; flex-wrap:wrap; }
.aic-tag { font-size:10px; padding:3px 9px; border-radius:99px; font-weight:500; }
.aic-conf { font-size:10px; padding:3px 8px; border-radius:99px; display:inline-block; font-weight:500; }
.aic-conf.h { background:#D1FAE5; color:#065F46; }
.aic-conf.m { background:#FEF3C7; color:#92400E; }
.aic-conf.l { background:#FEE2E2; color:#991B1B; }
.aic-amb { background:#FFFBEB; border-left:3px solid #BA7517; padding:8px 10px; border-radius:6px; margin-top:6px; }
.aic-amb-q { font-size:11px; font-weight:600; color:#92400E; margin-bottom:5px; }
.aic-amb-opts { display:flex; flex-wrap:wrap; gap:4px; }
.aic-amb-opt { font-size:10px; padding:4px 10px; background:#fff; border:1px solid #BA7517; color:#92400E; border-radius:99px; font-weight:500; cursor:pointer; font-family:inherit; }
.aic-amb-opt:hover, .aic-amb-opt.on { background:#BA7517; color:#fff; }

/* Bottom Nav */
.bnav { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #E5E7EB; padding:6px 4px 8px; display:flex; justify-content:space-around; z-index:48; }
.bnav-i { display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 12px; color:#9CA3AF; cursor:pointer; min-width:54px; text-decoration:none; }
.bnav-i.on { color:#1F3864; }
.bnav-ic { font-size:18px; }
.bnav-lb { font-size:9px; font-weight:500; }

@media(min-width:768px) { .dr-app { max-width:480px; margin:0 auto; } }
</style>
</head>
<body>

<div class="app dr-app">

  <div id="loadingScreen" class="loading">
    <div class="spinner"></div>
    <div>กำลังโหลด Daily Feed...</div>
  </div>

  <div id="mainContent" style="display:none">

    <!-- Header -->
    <div class="dr-hdr">
      <div class="dr-hdr-r">
        <div>
          <h2 class="dr-hdr-h">📜 Daily Activity</h2>
          <div class="dr-hdr-d" id="hdrDate">วันที่</div>
          <div class="dr-hdr-sub" id="hdrSub">Bow House · บันทึกประจำวัน</div>
        </div>
        <button class="dr-hdr-back" onclick="window.location.href='dashboard.html?project=bow-house'">← กลับ</button>
      </div>
    </div>

    <!-- Date bar -->
    <div class="dr-date-bar">
      <button class="dr-date-nav" onclick="dateNav(-1)">◀</button>
      <input id="reportDate" type="date">
      <button class="dr-date-nav" onclick="dateNav(1)" id="dateNext">▶</button>
      <button class="dr-date-nav" onclick="dateToday()" title="วันนี้">📅</button>
    </div>

    <!-- Stats -->
    <div class="dr-stats">
      <div class="dr-stats-h">
        <span>📊 ภาพรวม</span>
        <span style="font-weight:400;font-size:10px" id="logCountTxt">0 events</span>
      </div>
      <div class="dr-stats-grid">
        <div class="dr-stat-c"><div class="dr-stat-v" id="statTasks">0</div><div class="dr-stat-l">✓ tasks</div></div>
        <div class="dr-stat-c"><div class="dr-stat-v" id="statRcv">0</div><div class="dr-stat-l">📥 รับ</div></div>
        <div class="dr-stat-c"><div class="dr-stat-v" id="statWdr">0</div><div class="dr-stat-l">📤 เบิก</div></div>
        <div class="dr-stat-c"><div class="dr-stat-v" id="statCtr">0</div><div class="dr-stat-l">👷 ช่าง</div></div>
      </div>
    </div>

    <!-- COMPOSER -->
    <div class="dr-comp">
      <div class="dr-comp-strip">
        <div class="dr-comp-pulse"></div>
        <span>🤖 AI วิเคราะห์ + tag อัตโนมัติ — พิมพ์ พูด หรือถ่ายรูป</span>
      </div>
      <div class="dr-comp-body">
        <textarea id="logInput" class="dr-comp-ta" placeholder="เกิดอะไรขึ้น? AI จะเข้าใจให้เอง"></textarea>
      </div>
      <div class="dr-comp-tags">
        <span class="dr-comp-tag-lb">ทางลัด</span>
        <button class="dr-comp-tag" onclick="quickInsert('🌧️ ฝนตก ')">🌧️ ฝน</button>
        <button class="dr-comp-tag" onclick="quickInsert('⚠️ ปัญหา: ')">⚠️ ปัญหา</button>
        <button class="dr-comp-tag" id="tagsMore" onclick="toggleTagsMore()">⋯</button>
        <span class="dr-comp-extra" id="tagsExtra">
          <button class="dr-comp-tag" onclick="quickInsert('⏸️ พักงาน ')">⏸️ พัก</button>
          <button class="dr-comp-tag" onclick="quickInsert('🌅 เริ่มงาน ')">🌅 เริ่ม</button>
          <button class="dr-comp-tag" onclick="quickInsert('🌆 ปิดงาน ')">🌆 ปิด</button>
        </span>
      </div>
      <div class="dr-comp-foot">
        <button class="dr-comp-tool" title="ถ่ายรูป" onclick="onPhotoClick()">📷</button>
        <button class="dr-comp-tool mic" id="micBtn" title="พูด" onclick="onMicClick()">🎤</button>
        <button class="dr-comp-send" id="logSubmitBtn" onclick="submitLog()">บันทึก →</button>
      </div>
      <input id="photoInput" type="file" accept="image/*" capture="environment" style="display:none" onchange="onPhotoSelected(event)">
    </div>

    <!-- Timeline -->
    <div class="dr-tl-h"><span>📜 Timeline</span></div>
    <div class="dr-tl-filters">
      <button class="dr-tl-f on" onclick="setFilter('all',this)">ทั้งหมด</button>
      <button class="dr-tl-f" onclick="setFilter('manual',this)">📝 มือ</button>
      <button class="dr-tl-f" onclick="setFilter('auto',this)">🤖 อัตโนมัติ</button>
      <button class="dr-tl-f" onclick="setFilter('issue',this)">⚠️ ปัญหา</button>
    </div>
    <div id="timeline"></div>

  </div>
</div>

<!-- STICKY SUMMARY PILL -->
<div class="dr-sticky-wrap" id="stickyWrap" style="display:none">
  <div class="dr-summ-panel" id="summPanel">
    <div id="summBox"></div>
    <div class="dr-summ-acts" id="summActs" style="display:none">
      <button class="dr-summ-act" onclick="copySummary()">📋 Copy</button>
      <button class="dr-summ-act" onclick="genSummary(true)">🔄 ใหม่</button>
    </div>
  </div>
  <div class="dr-pill" id="stickyBar" onclick="toggleSummary()">
    <div class="dr-pill-i">🤖</div>
    <div class="dr-pill-t">สรุปวันนี้</div>
    <div class="dr-pill-c" id="stickyCount">0</div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bnav">
  <a class="bnav-i" href="dashboard.html?project=bow-house"><div class="bnav-ic">🏠</div><div class="bnav-lb">Home</div></a>
  <a class="bnav-i" href="materials.html?project=bow-house"><div class="bnav-ic">📦</div><div class="bnav-lb">Materials</div></a>
  <a class="bnav-i on" href="#"><div class="bnav-ic">📝</div><div class="bnav-lb">Daily</div></a>
  <a class="bnav-i" href="#" onclick="alert('เร็วๆ นี้: Team');return false"><div class="bnav-ic">👷</div><div class="bnav-lb">Team</div></a>
  <a class="bnav-i" href="projects.html"><div class="bnav-ic">⋯</div><div class="bnav-lb">More</div></a>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/modal.js"></script>
<script>
if (!Auth.requireAuth('admin')) {}

const drState = {
  date: new Date().toISOString().slice(0, 10),
  logs: [],
  stats: null,
  filter: 'all',
  contractors: [],
  ffs: [],
  pendingLog: null,
  summExpanded: false,
  summText: '',
  recognition: null,
  recording: false,
};

async function loadAll() {
  try {
    document.getElementById('reportDate').value = drState.date;
    document.getElementById('reportDate').onchange = (e) => {
      drState.date = e.target.value;
      refresh();
    };
    updateHeaderDate();

    // Use cached contractors + ffs if available
    const cachedCtrs = localStorage.getItem('dstr_contractors');
    const cachedFFs = localStorage.getItem('dstr_ffs');
    const cacheTime = parseInt(localStorage.getItem('dstr_cache_time') || '0');
    const cacheValid = (Date.now() - cacheTime) < 3600000; // 1 hour

    if (cachedCtrs && cachedFFs && cacheValid) {
      drState.contractors = JSON.parse(cachedCtrs);
      drState.ffs = JSON.parse(cachedFFs);
    }

    // Single bundled request — much faster
    const skipRefs = cacheValid && cachedCtrs && cachedFFs;
    const res = await API.callRead('get_daily_bundle', {
      date: drState.date,
      skip_refs: skipRefs ? 'true' : 'false'
    });

    if (!res.ok) throw new Error(res.error || 'Bundle load failed');
    const b = res.data || {};

    if (b.contractors) {
      drState.contractors = b.contractors;
      localStorage.setItem('dstr_contractors', JSON.stringify(b.contractors));
    }
    if (b.ffs) {
      drState.ffs = b.ffs;
      localStorage.setItem('dstr_ffs', JSON.stringify(b.ffs));
      localStorage.setItem('dstr_cache_time', String(Date.now()));
    }

    drState.stats = b.stats;
    drState.logs = b.feed || [];

    if (b.stats) renderStats(b.stats);
    renderFeed();

    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('dateNext').disabled = drState.date >= today;

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('stickyWrap').style.display = 'block';
  } catch (err) {
    document.getElementById('loadingScreen').innerHTML =
      '❌ โหลดไม่สำเร็จ: ' + err.message;
  }
}

async function refresh() {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('dateNext').disabled = drState.date >= today;
  updateHeaderDate();
  drState.summText = '';
  drState.summExpanded = false;
  document.getElementById('summPanel').classList.remove('on');
  document.getElementById('stickyBar').classList.remove('expanded');

  // Use bundle for refresh too (skip refs since we have them cached)
  try {
    const res = await API.callRead('get_daily_bundle', {
      date: drState.date,
      skip_refs: 'true'
    });
    if (res.ok && res.data) {
      drState.stats = res.data.stats;
      drState.logs = res.data.feed || [];
      if (res.data.stats) renderStats(res.data.stats);
      renderFeed();
    }
  } catch (e) {
    console.error('Refresh failed:', e);
  }
}

function updateHeaderDate() {
  const d = new Date(drState.date);
  document.getElementById('hdrDate').textContent =
    'วันที่ ' + formatThaiDate(d) + ' · ' + thaiDayName(drState.date);
}

function dateNav(delta) {
  const d = new Date(drState.date);
  d.setDate(d.getDate() + delta);
  const today = new Date().toISOString().slice(0, 10);
  const newDate = d.toISOString().slice(0, 10);
  if (delta > 0 && newDate > today) return;
  drState.date = newDate;
  document.getElementById('reportDate').value = drState.date;
  refresh();
}

function dateToday() {
  drState.date = new Date().toISOString().slice(0, 10);
  document.getElementById('reportDate').value = drState.date;
  refresh();
}

async function loadStats() {
  try {
    const res = await API.callRead('get_today_stats', { date: drState.date });
    if (!res.ok) return;
    drState.stats = res.data;
    renderStats(res.data);
  } catch (e) {}
}

function renderStats(s) {
  document.getElementById('statTasks').textContent = s.tasks_done || 0;
  document.getElementById('statRcv').textContent = s.received || 0;
  document.getElementById('statWdr').textContent = s.withdrawn || 0;
  document.getElementById('statCtr').textContent = s.contractors_involved || 0;
  document.getElementById('logCountTxt').textContent =
    (s.logs_total || 0) + ' events';
  document.getElementById('stickyCount').textContent = s.logs_total || 0;
}

async function loadFeed() {
  try {
    const res = await API.callRead('get_activity_feed', { date: drState.date });
    if (!res.ok) throw new Error('Load failed');
    drState.logs = res.data || [];
    renderFeed();
  } catch (err) {
    document.getElementById('timeline').innerHTML =
      '<div class="dr-empty">❌ ' + err.message + '</div>';
  }
}

function renderFeed() {
  let logs = drState.logs.slice();
  const f = drState.filter;
  if (f === 'manual') logs = logs.filter(l => l.type === 'manual');
  else if (f === 'auto') logs = logs.filter(l => l.type === 'auto');
  else if (f === 'issue') logs = logs.filter(l => (l.tags_issue || []).length > 0);

  if (logs.length === 0) {
    document.getElementById('timeline').innerHTML =
      '<div class="dr-empty"><div class="dr-empty-i">📭</div>ยังไม่มีบันทึก<br>เริ่มจากพิมพ์ด้านบนเลย!</div>';
    return;
  }

  const periods = { morning: [], afternoon: [], evening: [] };
  logs.forEach(l => {
    const h = parseInt(String(l.timestamp || '').slice(11, 13)) || 0;
    if (h < 12) periods.morning.push(l);
    else if (h < 17) periods.afternoon.push(l);
    else periods.evening.push(l);
  });

  const periodLabels = {
    evening: '🌆 เย็น (17:00 -)',
    afternoon: '🌞 บ่าย (12:00 - 17:00)',
    morning: '🌅 เช้า (- 12:00)'
  };

  let html = '';
  ['evening', 'afternoon', 'morning'].forEach(per => {
    const items = periods[per];
    if (items.length === 0) return;
    html += `<div class="dr-period">${periodLabels[per]} <span style="margin-left:auto;color:#9CA3AF;font-weight:400;text-transform:none;letter-spacing:0">${items.length} events</span></div>`;
    items.forEach(l => { html += renderLog(l); });
  });

  document.getElementById('timeline').innerHTML = html;
}

function renderLog(l) {
  const time = String(l.timestamp || '').slice(11, 16);
  const isAuto = l.type === 'auto';
  const tagsHtml = [];
  (l.tags_ff || []).forEach(t => tagsHtml.push(`<span class="dr-log-tag dr-tag-ff">${t}</span>`));
  (l.tags_ctr || []).forEach(t => {
    const c = drState.contractors.find(x => x.id === t);
    tagsHtml.push(`<span class="dr-log-tag dr-tag-ctr">👤 ${c ? c.name : t}</span>`);
  });
  (l.tags_issue || []).forEach(t => tagsHtml.push(`<span class="dr-log-tag dr-tag-issue">⚠️ ${t}</span>`));
  if (l.tags_phase) tagsHtml.push(`<span class="dr-log-tag dr-tag-phase">${l.tags_phase}</span>`);
  if (isAuto) tagsHtml.push('<span class="dr-log-tag dr-tag-auto">🤖 auto</span>');

  const xBtn = isAuto ? '' : `<div class="dr-log-x" onclick="deleteLog('${l.log_id}')">✕</div>`;

  return `
    <div class="dr-log ${isAuto?'auto':''}">
      <div class="dr-log-time">${time}</div>
      <div class="dr-log-bd">
        <div class="dr-log-txt">${escapeHtml(l.text)}</div>
        ${tagsHtml.length ? '<div class="dr-log-tags">' + tagsHtml.join('') + '</div>' : ''}
      </div>
      ${xBtn}
    </div>
  `;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
  );
}

function setFilter(f, btn) {
  drState.filter = f;
  document.querySelectorAll('.dr-tl-f').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderFeed();
}

function toggleTagsMore() {
  document.getElementById('tagsExtra').classList.toggle('on');

}

function quickInsert(text) {

// =========================
// VOICE INPUT
// =========================
function onMicClick() {
  // Check Web Speech API support
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    Modal.toast('❌ เบราว์เซอร์ไม่รองรับ Voice (ลองใช้ Chrome)');
    return;
  }

  if (drState.recording) {
    if (drState.recognition) drState.recognition.stop();
    return;
  }

  const recognition = new SR();
  recognition.lang = 'th-TH';
  recognition.continuous = false;
  recognition.interimResults = false;

  const btn = document.getElementById('micBtn');
  btn.classList.add('recording');
  btn.innerHTML = '⏹';
  drState.recording = true;
  drState.recognition = recognition;

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    const ta = document.getElementById('logInput');
    if (ta.value.trim()) ta.value = ta.value.trim() + ' ' + text;
    else ta.value = text;
    Modal.toast('✓ บันทึกเสียงแล้ว');
  };

  recognition.onerror = (e) => {
    Modal.toast('❌ Voice error: ' + e.error);
  };

  recognition.onend = () => {
    btn.classList.remove('recording');
    btn.innerHTML = '🎤';
    drState.recording = false;
  };

  try {
    recognition.start();
    Modal.toast('🎤 พูดได้เลย...');
  } catch (e) {
    btn.classList.remove('recording');
    btn.innerHTML = '🎤';
    drState.recording = false;
    Modal.toast('❌ ' + e.message);
  }
}

// =========================
// SUBMIT LOG WITH AI CONFIRM
// =========================
async function submitLog() {
  const text = document.getElementById('logInput').value.trim();
  if (!text) {
    Modal.toast('กรุณาพิมพ์ข้อความก่อน');
    return;
  }

  const btn = document.getElementById('logSubmitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="width:12px;height:12px;border-width:2px;display:inline-block;vertical-align:middle"></span> AI...';

  try {
    const parseRes = await API.callPost('parse_activity_text', { text: text });
    if (!parseRes.ok) {
      showAiConfirmModal(text, null);
    } else {
      showAiConfirmModal(text, parseRes.data);
    }
  } catch (err) {
    showAiConfirmModal(text, null);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'บันทึก →';
  }
}

function showAiConfirmModal(text, ai) {
  drState.pendingLog = { text, ai, resolvedTags: {} };

  let confLevel = '', confText = '';
  if (ai && ai.confidence !== undefined) {
    const c = Number(ai.confidence);
    if (c >= 0.85) { confLevel = 'h'; confText = `แม่นยำ ${Math.round(c*100)}%`; }
    else if (c >= 0.7) { confLevel = 'm'; confText = `ปานกลาง ${Math.round(c*100)}%`; }
    else { confLevel = 'l'; confText = `ไม่แน่ใจ ${Math.round(c*100)}%`; }
  }

  let tagsHtml = '';
  if (ai) {
    if (ai.summary) {
      tagsHtml += `<div class="aic-section"><div class="aic-h">🧠 AI เข้าใจว่า</div><div style="font-size:11.5px;color:#374151;line-height:1.5;font-style:italic">"${escapeHtml(ai.summary)}"</div></div>`;
    }
    const ffTags = ai.tags_ff || [];
    if (ffTags.length) {
      tagsHtml += '<div class="aic-section"><div class="aic-h">🏠 FF Items</div><div class="aic-tags">';
      ffTags.forEach(f => {
        const ff = drState.ffs.find(x => x.code === f);
        tagsHtml += `<span class="aic-tag dr-tag-ff">${f}${ff?': '+escapeHtml(ff.name).slice(0,25):''}</span>`;
      });
      tagsHtml += '</div></div>';
    }
    const ctrTags = ai.tags_ctr || [];
    if (ctrTags.length) {
      tagsHtml += '<div class="aic-section"><div class="aic-h">👤 ช่าง</div><div class="aic-tags">';
      ctrTags.forEach(c => {
        const ctr = drState.contractors.find(x => x.id === c);
        tagsHtml += `<span class="aic-tag dr-tag-ctr">${ctr?escapeHtml(ctr.name):c}</span>`;
      });
      tagsHtml += '</div></div>';
    }
    const issueTags = ai.tags_issue || [];
    if (issueTags.length) {
      tagsHtml += '<div class="aic-section"><div class="aic-h">⚠️ ปัญหา/สถานการณ์</div><div class="aic-tags">';
      issueTags.forEach(i => {
        tagsHtml += `<span class="aic-tag dr-tag-issue">${escapeHtml(i)}</span>`;
      });
      tagsHtml += '</div></div>';
    }

    const amb = ai.ambiguous || [];
    if (amb.length) {
      tagsHtml += '<div class="aic-h" style="margin-top:10px;color:#92400E">❓ ต้องระบุเพิ่ม</div>';
      amb.forEach((a, idx) => {
        tagsHtml += `<div class="aic-amb">
          <div class="aic-amb-q">"${escapeHtml(a.term)}" — ${escapeHtml(a.reason || 'มีหลายความหมาย')}</div>
          <div class="aic-amb-opts" data-amb="${idx}">`;
        (a.options || []).forEach(opt => {
          const ff = drState.ffs.find(x => x.code === opt);
          tagsHtml += `<button class="aic-amb-opt" onclick="resolveAmbiguous(${idx},'${opt}',this)">${opt}${ff?' '+escapeHtml(ff.name).slice(0,20):''}</button>`;
        });
        tagsHtml += `<button class="aic-amb-opt" onclick="resolveAmbiguous(${idx},'__skip__',this)" style="border-color:#9CA3AF;color:#6B7280">ข้าม</button>`;
        tagsHtml += '</div></div>';
      });
    }
  } else {
    tagsHtml = '<div class="aic-section" style="color:#6B7280;font-size:11px">⚠️ AI ไม่สามารถวิเคราะห์ได้ — บันทึกแบบไม่มี tag</div>';
  }

  const html = `
    <div class="modal-title">🤖 ยืนยันก่อนบันทึก</div>
    <div class="modal-desc">${confText ? `<span class="aic-conf ${confLevel}">${confText}</span> ` : ''}AI วิเคราะห์ tags ให้แล้ว — กดยืนยันถ้าถูก</div>
    <div class="aic-card">
      <div class="aic-section">
        <div class="aic-h">📝 ข้อความ</div>
        <div style="font-size:12px;color:#1F2937;line-height:1.5">${escapeHtml(text)}</div>
      </div>
      ${tagsHtml}
    </div>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-cancel" onclick="cancelLog()">ยกเลิก</button>
      <button class="modal-btn modal-btn-primary" onclick="confirmLog()">✓ ยืนยันบันทึก</button>
    </div>
  `;
  Modal.show(html, 'pay-modal');
}

function resolveAmbiguous(idx, choice, btn) {
  if (!drState.pendingLog) return;
  btn.parentElement.querySelectorAll('.aic-amb-opt').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  drState.pendingLog.resolvedTags['amb_' + idx] = choice;
}

function cancelLog() {
  drState.pendingLog = null;
  Modal.close();
}

async function confirmLog() {
  if (!drState.pendingLog) return;
  const { text, ai, resolvedTags } = drState.pendingLog;

  let tags_ff = (ai && ai.tags_ff) ? ai.tags_ff.slice() : [];
  let tags_ctr = (ai && ai.tags_ctr) ? ai.tags_ctr.slice() : [];
  let tags_issue = (ai && ai.tags_issue) ? ai.tags_issue.slice() : [];
  let tags_phase = (ai && ai.tags_phase) ? ai.tags_phase : '';

  if (ai && ai.ambiguous) {
    ai.ambiguous.forEach((a, idx) => {
      const choice = resolvedTags['amb_' + idx];
      if (choice && choice !== '__skip__') {
        if (choice.match(/^F-/)) tags_ff.push(choice);
        else if (choice.match(/^C\d/)) tags_ctr.push(choice);
      }
    });
  }

  tags_ff = [...new Set(tags_ff)];
  tags_ctr = [...new Set(tags_ctr)];
  tags_issue = [...new Set(tags_issue)];

  Modal.close();
  Modal.toast('กำลังบันทึก...');

  try {
    // Use callWrite (no-cors POST) for reliability — same as materials save
    const payload = {
      text: text,
      source: 'admin',
      auto_tag: 'false',
      tags_ff: tags_ff.join(','),
      tags_ctr: tags_ctr.join(','),
      tags_issue: tags_issue.join(','),
      tags_phase: tags_phase,
      date: drState.date
    };
    const res = await API.callWrite('add_activity_log', payload);
    if (!res.ok) throw new Error(res.error || 'Save failed');

    Modal.toast('✓ บันทึกแล้ว');
    document.getElementById('logInput').value = '';
    drState.pendingLog = null;
    // Wait a moment for backend to commit, then refresh
    setTimeout(() => refresh(), 1200);
  } catch (err) {
    Modal.toast('❌ ' + err.message);
  }
}

// =========================
// STICKY SUMMARY
// =========================
async function toggleSummary() {
  if (drState.summExpanded) {
    document.getElementById('summPanel').classList.remove('on');
    document.getElementById('stickyBar').classList.remove('expanded');
    drState.summExpanded = false;
    return;
  }
  drState.summExpanded = true;
  document.getElementById('summPanel').classList.add('on');
  document.getElementById('stickyBar').classList.add('expanded');

  if (!drState.summText) {
    await genSummary(false);
  }
}

async function genSummary(force) {
  const box = document.getElementById('summBox');
  const acts = document.getElementById('summActs');
  box.innerHTML = '<div class="dr-summ-loading">🤖 AI กำลังสรุป...</div>';
  acts.style.display = 'none';

  try {
    const res = await API.callPost('generate_daily_summary_v2', { date: drState.date });
    if (!res.ok || !res.data) throw new Error(res.error || 'AI failed');
    drState.summText = res.data.summary || '(ไม่มีข้อมูลให้สรุป)';
    box.innerHTML = '<div class="dr-summ-tx">' + escapeHtml(drState.summText) + '</div>';
    acts.style.display = 'flex';
  } catch (err) {
    box.innerHTML = '<div style="color:#991B1B;font-size:11px;text-align:center;padding:10px">❌ ' + err.message + '</div>';
  }
}

function copySummary() {
  if (!drState.summText) return;
  navigator.clipboard.writeText(drState.summText).then(() => {
    Modal.toast('✓ Copy แล้ว');
  });
}

async function deleteLog(logId) {
  if (!confirm('ลบบันทึกนี้?')) return;
  try {
    const res = await API.callPost('delete_activity_log', { log_id: logId });
    if (!res.ok) throw new Error(res.error || 'Delete failed');
    Modal.toast('✓ ลบแล้ว');
    await refresh();
  } catch (err) {
    Modal.toast('❌ ' + err.message);
  }
}

function formatThaiDate(d) {
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543}`;
}

function thaiDayName(dStr) {
  if (!dStr) return '';
  const d = new Date(dStr);
  if (isNaN(d)) return '';
  const days = ['วันอาทิตย์','วันจันทร์','วันอังคาร','วันพุธ','วันพฤหัสบดี','วันศุกร์','วันเสาร์'];
  return days[d.getDay()];
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    const ta = document.getElementById('logInput');
    if (document.activeElement === ta) submitLog();
  }
});
